<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilha do Foco — com a Kapi</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B3D2E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0B3D2E; --bg-mid:#15563F; --bg-mid2:#1C6A4C;
    --sand:#F0C878; --papaya:#F2703C; --lilac:#8FA6CD; --cream:#FFF8ED;
    --leaf:#4C9A5C; --leaf-dark:#357048; --berry:#E5556E; --success:#7CC576; --ink:#0B3D2E;
    --shadow: 0 10px 30px rgba(0,0,0,.25); --radius-lg: 28px; --radius-md: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, var(--bg-mid2), transparent 60%),
      radial-gradient(1000px 500px at 100% 10%, var(--bg-mid), transparent 55%),
      var(--bg-deep);
    color:var(--cream); min-height:100vh; overflow-x:hidden; position:relative;
  }
  h1,h2,h3,.display{font-family:'Baloo 2',cursive;}
  button{font-family:inherit;}

  .ambient-leaf{ position:fixed; font-size:28px; opacity:.18; pointer-events:none; animation: drift 14s linear infinite; }
  @keyframes drift{ 0%{ transform: translateY(110vh) rotate(0deg);} 100%{ transform: translateY(-10vh) rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){ .ambient-leaf{ display:none; } *{ animation-duration: .001ms !important; } }

  .app{ max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; position:relative; z-index:1; }

  .hub-header{ display:flex; align-items:center; gap:14px; justify-content:space-between; margin-bottom: 22px; flex-wrap: wrap; }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand h1{ font-size: 28px; margin:0; letter-spacing:.3px; color:var(--sand); }
  .brand p{ margin:2px 0 0; font-size:13px; color:var(--lilac); font-weight:700;}
  .top-actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .seeds{ display:flex; align-items:center; gap:8px; background: rgba(255,255,255,.08); border:2px solid rgba(240,200,120,.35); padding:8px 16px; border-radius: 999px; font-weight:800; font-size:15px; color:var(--sand); }
  .icon-btn{ background: rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); color:var(--cream); padding:8px 14px; border-radius:999px; cursor:pointer; font-weight:800; font-size:13.5px; }
  .icon-btn:hover{ background: rgba(255,255,255,.2); }
  .profile-chip{ display:flex; align-items:center; gap:8px; background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); padding:6px 14px 6px 8px; border-radius: 999px; font-weight:800; font-size:14px; }
  .profile-chip .av{ font-size:20px; }
  .lang-toggle{ display:flex; gap:4px; background: rgba(255,255,255,.08); border-radius:999px; padding:4px; border:2px solid rgba(255,255,255,.15); }
  .lang-toggle button{ background:transparent; border:none; font-size:18px; padding:4px 8px; border-radius:999px; cursor:pointer; opacity:.5; }
  .lang-toggle button.active{ opacity:1; background: rgba(255,255,255,.18); }

  .mascot-wrap{ display:flex; flex-direction:column; align-items:center; margin: 6px 0 26px; }
  .mascot-float{ animation: float 4s ease-in-out infinite; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .speech{ background: var(--cream); color:var(--ink); font-weight:800; padding:10px 18px; border-radius: 18px; margin-top:8px; box-shadow: var(--shadow); font-size:15px; max-width: 380px; text-align:center; position:relative; display:flex; align-items:center; gap:8px; }
  .speech:after{ content:""; position:absolute; top:-8px; left:50%; transform:translateX(-50%); border-width:0 8px 8px 8px; border-style:solid; border-color: transparent transparent var(--cream) transparent; }
  .speech-text{ flex:1; }

  .tts-btn{ background: rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.3); color:var(--cream); width:32px; height:32px; min-width:32px; border-radius:50%; cursor:pointer; font-size:15px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; padding:0; line-height:1; transition: transform .1s, background .1s; }
  .tts-btn:hover{ background: rgba(255,255,255,.28); transform: scale(1.08); }
  .tts-btn:active{ transform: scale(.95); }
  .tts-btn-light{ background: rgba(11,61,46,.08); border:2px solid rgba(11,61,46,.18); color:var(--ink); }
  .tts-btn-light:hover{ background: rgba(11,61,46,.16); }
  .tts-icon{ position:absolute; font-size:15px; cursor:pointer; opacity:.7; line-height:1; }
  .tts-icon:hover{ opacity:1; }
  .help-btn{ background: rgba(240,200,120,.18); border:2px solid rgba(240,200,120,.4); color:var(--cream); width:32px; height:32px; min-width:32px; border-radius:50%; cursor:pointer; font-size:15px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; padding:0; line-height:1; transition: transform .1s, background .1s; }
  .help-btn:hover{ background: rgba(240,200,120,.3); transform: scale(1.08); }
  .help-btn:active{ transform: scale(.95); }

  .grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:18px; }
  .tile{ background: linear-gradient(160deg, rgba(255,255,255,.08), rgba(255,255,255,.02)); border: 2px solid rgba(255,255,255,.12); border-radius: var(--radius-lg); padding: 20px 18px; cursor:pointer; position:relative; text-align:left; transition: transform .15s ease, border-color .15s ease, background .15s ease; display:flex; flex-direction:column; gap:8px; }
  .tile:hover, .tile:focus-visible{ transform: translateY(-4px); border-color: var(--sand); background: linear-gradient(160deg, rgba(255,255,255,.14), rgba(255,255,255,.04)); outline: none; }
  .tile .emoji{ font-size:36px; }
  .tile h3{ margin:0; font-size:19px; color:var(--cream); }
  .tile .skill{ font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color: var(--bg-deep); background: var(--sand); display:inline-block; padding:3px 10px; border-radius:999px; width:fit-content; }
  .tile p{ margin:0; font-size:13.5px; color:var(--lilac); font-weight:600; line-height:1.4;}
  .tile .stars-earned{ margin-top:4px; font-size:14px; }

  .screen{ display:none; } .screen.active{ display:block; }
  .game-shell{ background: rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12); border-radius: var(--radius-lg); padding: 24px; min-height: 420px; position:relative; }
  .top-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:10px; flex-wrap:wrap;}
  .back-btn{ background: rgba(255,255,255,.1); color:var(--cream); border:2px solid rgba(255,255,255,.2); padding:8px 16px; border-radius:999px; font-weight:800; cursor:pointer; font-size:14px; }
  .back-btn:hover{ background: rgba(255,255,255,.2); }
  .game-title{ font-size:22px; margin:0; color:var(--sand); }
  .game-instructions{ background: rgba(255,255,255,.08); border-left:4px solid var(--papaya); padding:12px 16px; border-radius:12px; font-size:14.5px; font-weight:700; margin-bottom:18px; color:var(--cream); display:flex; align-items:center; gap:12px; }
  .game-instructions .instr-text{ flex:1; }
  .feedback-banner{ text-align:center; font-weight:800; font-size:17px; padding:14px; border-radius:16px; margin: 14px 0; display:none; }
  .feedback-banner .tts-btn{ margin-left:8px; vertical-align:middle; }
  .feedback-banner.show{ display:block; }
  .feedback-banner.good{ background: rgba(124,197,118,.2); color:#B8E8B0; border:2px solid var(--success); }
  .feedback-banner.gentle{ background: rgba(255,255,255,.08); color: var(--sand); border:2px solid rgba(240,200,120,.4); }

  .big-cta{ background: var(--papaya); color:white; border:none; font-weight:800; font-size:16px; padding:14px 26px; border-radius:999px; cursor:pointer; box-shadow: var(--shadow); transition: transform .1s ease; }
  .big-cta:hover{ transform: scale(1.03); } .big-cta:active{ transform: scale(.98); }
  .big-cta.secondary{ background: transparent; border:2px solid var(--sand); color:var(--sand); }
  .center-col{ display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center; }

  .diff-row{ display:flex; gap:10px; margin-bottom:6px; flex-wrap:wrap; justify-content:center; }
  .diff-btn{ padding:10px 20px; border-radius:999px; border:2px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06); color:var(--cream); cursor:pointer; font-weight:800; font-size:14px; }
  .diff-btn.selected{ border-color: var(--papaya); background: rgba(242,112,60,.28); }
  .pre-start{ display:flex; flex-direction:column; align-items:center; gap:14px; padding: 10px 0 4px; }

  .light-circle{ width:160px; height:160px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:42px; font-weight:800; color:white; box-shadow: var(--shadow); transition: background .25s ease; cursor:pointer; user-select:none; border: 6px solid rgba(255,255,255,.2); }
  .light-circle.wait{ background: radial-gradient(circle at 35% 30%, #ff8b8b, var(--berry)); }
  .light-circle.go{ background: radial-gradient(circle at 35% 30%, #a8e79f, var(--success)); }
  .rounds-track{ display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; justify-content:center; }
  .round-dot{ width:14px; height:14px; border-radius:50%; background: rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.3);}
  .round-dot.hit{ background: var(--success); border-color:var(--success); }
  .round-dot.miss{ background: var(--berry); border-color:var(--berry); }

  .trail-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:20px; width: min(360px,85vw); }
  .trail-pad{ aspect-ratio:1; min-height:120px; border-radius:26px; border:none; cursor:pointer; opacity:.6; transition: opacity .15s ease, transform .1s ease; box-shadow: var(--shadow); display:flex; align-items:center; justify-content:center; font-size:46px; touch-action:manipulation; -webkit-tap-highlight-color:transparent; user-select:none; }
  .trail-pad.lit{ opacity:1; transform: scale(1.08); }
  .trail-pad.locked{ pointer-events:none; }
  .trail-pad:active{ transform: scale(.94); }
  .trail-pad:nth-child(1){ background:#F2703C; } .trail-pad:nth-child(2){ background:#8FA6CD; }
  .trail-pad:nth-child(3){ background:#F0C878; } .trail-pad:nth-child(4){ background:#7CC576; }
  .trail-footprints{ display:flex; gap:8px; min-height:18px; }
  .trail-footprints span{ opacity:.25; font-size:16px; transition: opacity .15s ease; }
  .trail-footprints span.done{ opacity:1; }
  .level-badge{ font-weight:800; color:var(--sand); font-size:15px; }

  .story-cards{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .story-card{ width:110px; height:110px; background: var(--cream); color:var(--ink); border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:38px; cursor:pointer; position:relative; box-shadow: var(--shadow); border:3px solid transparent; transition: transform .1s; }
  .story-card:hover{ transform: translateY(-3px); }
  .answer-row{ display:flex; gap:14px; justify-content:center; margin-top:22px; flex-wrap:wrap; min-height:110px; }
  .answer-slot{ width:110px; height:110px; border-radius:18px; border:3px dashed rgba(255,255,255,.3); display:flex; align-items:center; justify-content:center; font-size:34px; color: rgba(255,255,255,.4); }
  .answer-slot.filled{ border-style:solid; background:var(--cream); color:var(--ink); }

  .chat-bubble{ background: var(--cream); color:var(--ink); border-radius:20px 20px 20px 4px; padding:16px 20px; font-weight:700; font-size:16px; max-width:480px; box-shadow: var(--shadow); text-align:left; display:flex; align-items:center; gap:10px; }
  .chat-bubble .speech-text{ flex:1; }
  .reply-options{ display:flex; flex-direction:column; gap:10px; width:min(480px,90vw); }
  .reply-btn{ background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2); color:var(--cream); padding:13px 18px; padding-right:42px; border-radius:16px; text-align:left; cursor:pointer; font-weight:700; font-size:14.5px; position:relative; }
  .reply-btn:hover{ border-color: var(--sand); background: rgba(255,255,255,.14); }
  .reply-hint{ display:block; font-weight:600; font-size:12px; opacity:.65; margin-top:3px; }
  .reply-btn .tts-icon{ top:50%; right:12px; transform:translateY(-50%); }
  .turn-indicator{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; color: var(--lilac); }
  .turn-dot{ width:10px; height:10px; border-radius:50%; background: var(--lilac); animation: pulse 1.2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:.4} 50%{opacity:1} }

  .hunt-header{ display:flex; justify-content:space-between; width:100%; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:10px;}
  .hunt-grid{ display:grid; gap:8px; width:min(460px,90vw); }
  .hunt-cell{ aspect-ratio:1; background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.12); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; transition: transform .08s; }
  .hunt-cell:hover{ transform: scale(1.06); }
  .hunt-cell.found{ background: rgba(124,197,118,.25); border-color: var(--success); cursor:default; }
  .timer-bar-wrap{ width:min(460px,90vw); height:12px; background: rgba(255,255,255,.12); border-radius:999px; overflow:hidden; }
  .timer-bar{ height:100%; background: var(--papaya); width:100%; transition: width 1s linear; }

  .scenario-box{ background: rgba(255,255,255,.08); border-radius:18px; padding:18px 22px; font-size:16px; font-weight:700; max-width:520px; text-align:center; display:flex; align-items:center; gap:10px; }
  .scenario-box .instr-text{ flex:1; }
  .emo-options, .calm-options{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .emo-btn{ background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2); border-radius:16px; padding:14px 12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--cream); font-size:12.5px; font-weight:800; width:92px; position:relative; }
  .emo-btn .e{ font-size:30px; }
  .emo-btn:hover, .emo-btn.selected{ border-color: var(--sand); background: rgba(255,255,255,.16); }
  .emo-btn .tts-icon{ top:6px; right:8px; font-size:13px; }
  .breathe-circle{ width:90px; height:90px; border-radius:50%; background: radial-gradient(circle at 35% 30%, #a8e79f, var(--success)); margin: 10px auto; animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ transform:scale(.8);} 50%{ transform:scale(1.15);} }
  .thermo-progress{ font-size:12.5px; font-weight:800; color:var(--lilac); }

  /* ---------- PROFILES SCREEN ---------- */
  .profile-intro{ text-align:center; margin-bottom:22px; }
  .profile-intro h2{ font-size:26px; color:var(--sand); margin:0 0 6px; }
  .profile-intro p{ margin:0; color:var(--lilac); font-weight:700; font-size:14px; }
  .profile-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:16px; margin-bottom: 10px;}
  .profile-card{ background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); border-radius:20px; padding:18px 12px; text-align:center; cursor:pointer; transition:transform .15s, border-color .15s; position:relative; }
  .profile-card:hover{ transform:translateY(-4px); border-color:var(--sand); }
  .profile-card .avatar{ font-size:42px; }
  .profile-card .pname{ font-weight:800; margin-top:6px; font-family:'Baloo 2'; font-size:15.5px; }
  .profile-card .plang{ font-size:11.5px; color:var(--lilac); font-weight:700; margin-top:2px; }
  .profile-card .del-x{ position:absolute; top:6px; right:8px; background:none; border:none; color: rgba(255,255,255,.4); font-size:16px; cursor:pointer; font-weight:800;}
  .profile-card .del-x:hover{ color: var(--berry); }
  .profile-card.add-new{ border-style:dashed; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; min-height:106px; }
  .profile-form{ background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); border-radius:20px; padding:22px; margin-top:20px; max-width:440px; }
  .profile-form label{ display:block; font-weight:800; font-size:13.5px; color:var(--sand); margin-bottom:6px; }
  .profile-form input[type=text]{ width:100%; padding:12px 14px; border-radius:12px; border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:var(--cream); font-size:15px; font-weight:700; margin-bottom:16px; }
  .profile-form input[type=text]::placeholder{ color: rgba(255,255,255,.4); }
  .avatar-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .avatar-choice{ font-size:26px; background:rgba(255,255,255,.06); border:2px solid transparent; border-radius:12px; padding:6px 10px; cursor:pointer; }
  .avatar-choice.selected{ border-color:var(--sand); background:rgba(255,255,255,.16); }
  .lang-row{ display:flex; gap:10px; margin-bottom:18px; }
  .lang-choice{ flex:1; padding:12px; border-radius:12px; border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06); color:var(--cream); cursor:pointer; font-weight:800; text-align:center; font-size:14px; }
  .lang-choice.selected{ border-color:var(--sand); background:rgba(255,255,255,.18); }

  footer{ text-align:center; margin-top: 34px; font-size:12.5px; color: rgba(255,255,255,.35); font-weight:700; }

  /* ---------- AUTH SCREEN ---------- */
  .auth-box { background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.15); border-radius: var(--radius-lg); padding: 32px; max-width: 400px; margin: 40px auto; text-align: center; }
  #authLegalConsent a{ color: var(--sand); font-weight:700; }
  .auth-box h2 { color: var(--sand); font-size: 24px; margin-top: 0; margin-bottom: 8px; }
  .auth-box p { color: var(--cream); opacity: 0.8; font-size: 14.5px; margin-bottom: 24px; }
  .auth-form { display: flex; flex-direction: column; gap: 16px; text-align: left; }
  .auth-form label { font-weight: 800; font-size: 13.5px; color: var(--sand); margin-bottom: -10px; }
  .auth-form input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 2px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: var(--cream); font-size: 15px; font-weight: 700; }
  .auth-form input::placeholder { color: rgba(255,255,255,.4); }
  .auth-form select { width: 100%; padding: 12px 14px; border-radius: 12px; border: 2px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: var(--cream); font-size: 15px; font-weight: 700; font-family: inherit; }
  .auth-form select option { background: var(--bg-deep); color: var(--cream); }
  .auth-error { background: rgba(229,85,110,.2); color: #FFA3B1; border: 1px solid var(--berry); padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; text-align: center; display: none; }
  .auth-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .auth-toggle { background: transparent; border: none; color: var(--sand); font-weight: 700; font-size: 13.5px; cursor: pointer; text-decoration: underline; opacity: 0.8; }
  .auth-toggle:hover { opacity: 1; }
  .auth-divider { display:flex; align-items:center; gap:12px; margin:18px 0; color:rgba(255,255,255,.4); font-size:12.5px; font-weight:700; }
  .auth-divider::before, .auth-divider::after { content:""; flex:1; height:1px; background:rgba(255,255,255,.18); }
  .auth-google-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:var(--cream); border:2px solid rgba(255,255,255,.2); color:#3C3C3C; font-weight:800; font-size:14.5px; padding:12px 14px; border-radius:999px; cursor:pointer; font-family:'Nunito',sans-serif; }
  .auth-google-btn:hover { background:#fff; }
  .auth-google-btn:disabled { opacity:.6; cursor:default; }
  .logout-btn { background: rgba(255,255,255,.1); border: 2px solid rgba(255,255,255,.2); color: var(--cream); padding: 8px 16px; border-radius: 999px; font-weight: 800; font-size: 13px; cursor: pointer; display: block; margin: 0 auto 20px auto; }
  .logout-btn:hover { background: rgba(255,255,255,.2); border-color: var(--sand); }
  .global-error { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--berry); color: white; padding: 12px 24px; border-radius: 999px; font-weight: 800; box-shadow: var(--shadow); z-index: 9999; display: none; }

  /* ---------- PARENTS AREA ---------- */
  .parents-gate{ max-width:360px; margin:10px auto; text-align:center; }
  .parents-gate h3{ color:var(--sand); font-size:20px; margin:0 0 6px; }
  .parents-gate p{ color:var(--cream); opacity:.85; font-size:14px; margin:0 0 18px; }
  .parents-gate label{ display:block; font-weight:800; font-size:13.5px; color:var(--sand); margin-bottom:6px; text-align:left; }
  .pin-input{ width:100%; padding:12px 14px; border-radius:12px; border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:var(--cream); font-size:20px; font-weight:800; letter-spacing:10px; text-align:center; margin-bottom:16px; }
  .parents-gate .big-cta{ width:100%; margin-top:4px; }
  .parents-gate .auth-toggle{ margin-top:14px; }
  #parentsSetupBlock .auth-error, #parentsEnterBlock .auth-error{ margin-bottom:14px; }

  .parents-summary{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:22px; }
  .parents-stat{ background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.12); border-radius:16px; padding:12px 20px; text-align:center; min-width:120px; }
  .parents-stat .v{ display:block; font-size:20px; font-weight:800; color:var(--sand); }
  .parents-stat .l{ display:block; font-size:12px; font-weight:700; color:var(--lilac); margin-top:2px; }

  .parents-grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:16px; }
  .parents-card{ background: rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12); border-radius:18px; padding:16px; }
  .parents-card-head{ display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .parents-card-head .emoji{ font-size:22px; }
  .parents-card-head .title{ font-weight:800; color:var(--cream); font-size:14.5px; flex:1; }
  .parents-card-head .diff-tag{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--bg-deep); background:var(--sand); padding:3px 10px; border-radius:999px; }

  .trend-chart-wrap{ position:relative; width:100%; aspect-ratio: 280 / 84; }
  .trend-chart{ width:100%; height:100%; display:block; overflow:visible; }
  .trend-grid{ stroke: rgba(255,255,255,.14); stroke-width:1; }
  .trend-line{ fill:none; stroke:var(--papaya); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .trend-dot{ fill:var(--papaya); stroke:var(--bg-deep); stroke-width:2; cursor:pointer; }
  .trend-dot:hover, .trend-dot:focus{ fill:var(--sand); outline:none; }
  .chart-tip{ position:absolute; transform:translate(-50%,-135%); background:var(--cream); color:var(--ink); font-size:11px; font-weight:800; padding:5px 9px; border-radius:8px; white-space:nowrap; box-shadow:var(--shadow); pointer-events:none; display:none; z-index:5; }
  .chart-empty{ color: var(--lilac); font-size:13px; font-weight:700; text-align:center; padding:14px 0; }
  .parents-recent{ list-style:none; margin:10px 0 0; padding:0; font-size:12px; color: var(--cream); opacity:.85; display:flex; flex-direction:column; gap:3px; }

  .parents-topline{ display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .parents-premium-badge{ display:inline-flex; align-items:center; gap:6px; background:rgba(240,200,120,.18); border:2px solid var(--sand); border-radius:999px; padding:5px 14px; color:var(--sand); font-weight:800; font-size:12.5px; }
  .parents-manage-sub-btn{ background:transparent; border:2px solid rgba(255,255,255,.25); color:var(--cream); font-weight:800; font-size:12.5px; padding:5px 14px; border-radius:999px; cursor:pointer; }
  .parents-manage-sub-btn:hover{ background:rgba(255,255,255,.1); }
  .parents-manage-sub-btn:disabled{ opacity:.6; cursor:default; }
  .parents-tip{ display:flex; gap:12px; align-items:flex-start; background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.12); border-radius:16px; padding:14px 16px; margin-bottom:18px; text-align:left; }
  .parents-tip .tip-emoji{ font-size:24px; }
  .parents-tip .tip-title{ font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--leaf); margin-bottom:3px; }
  .parents-tip .tip-text{ font-size:13.5px; color:var(--cream); opacity:.92; line-height:1.5; }

  .parents-section-title{ display:flex; align-items:center; gap:8px; font-weight:800; color:var(--sand); font-size:15px; margin: 22px 0 10px; }
  .parents-section-subtitle{ font-size:12px; font-weight:700; color:var(--lilac); margin:-8px 0 12px; }

  .parents-reading-card{ background: rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12); border-radius:18px; padding:16px; }
  .syllable-chips{ display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .syllable-chip{ background:var(--cream); color:var(--leaf-dark); font-weight:800; font-size:12.5px; padding:3px 10px; border-radius:8px; }
  .parents-reading-row{ display:flex; justify-content:space-between; font-size:13.5px; font-weight:700; color:var(--cream); margin-top:8px; }
  .parents-reading-label{ font-size:11.5px; font-weight:700; color:var(--lilac); }

  .weekly-chart-card{ background: rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12); border-radius:18px; padding:16px; }
  .weekly-bars{ display:flex; align-items:flex-end; gap:8px; height:110px; margin-top:14px; }
  .weekly-bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:6px; }
  .weekly-bar{ width:100%; max-width:26px; background: var(--leaf); border-radius:6px 6px 2px 2px; min-height:3px; transition: height .2s ease; }
  .weekly-bar-label{ font-size:11px; font-weight:700; color:var(--lilac); }

  .parents-adherence-row{ padding:9px 0; border-top:1px solid rgba(255,255,255,.08); }
  .parents-adherence-row:first-child{ border-top:none; padding-top:0; }
  .parents-adherence-line{ font-size:13.5px; font-weight:700; color:var(--cream); }
  .parents-adherence-phrase{ font-size:12px; color:var(--lilac); margin-top:2px; }

  .parents-professionals-card{ background: rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12); border-radius:18px; padding:16px; display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; }
  .parents-professionals-card .txt{ font-size:13px; color:var(--cream); opacity:.85; max-width:340px; text-align:left; }
  .parents-invite-btn{ background: var(--papaya); color:#fff; border:none; border-radius:12px; padding:9px 16px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; }
  .parents-invite-btn:disabled{ opacity:.6; cursor:default; }

  .parents-pending-requests{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .parents-pending-row{ background: rgba(240,200,120,.1); border:2px solid rgba(240,200,120,.35); border-radius:16px; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  .parents-pending-row .txt{ font-size:13px; color:var(--cream); }
  .parents-pending-actions{ display:flex; gap:8px; }
  .parents-approve-btn{ background: var(--success); color:#0B3D2E; border:none; border-radius:10px; padding:7px 14px; font-weight:800; font-size:12.5px; cursor:pointer; }
  .parents-reject-btn{ background: rgba(255,255,255,.1); color:var(--cream); border:2px solid rgba(255,255,255,.2); border-radius:10px; padding:7px 14px; font-weight:800; font-size:12.5px; cursor:pointer; }
  .parents-pending-actions button:disabled{ opacity:.6; cursor:default; }

  .parents-invite-code-card{ background: rgba(124,197,118,.12); border:2px solid var(--success); border-radius:16px; padding:16px; text-align:center; margin-top:10px; }
  .invite-code-value{ font-family:'Baloo 2',cursive; font-size:28px; font-weight:800; color:var(--sand); letter-spacing:1px; margin-bottom:10px; }
  .parents-copy-btn{ background: var(--papaya); color:#fff; border:none; border-radius:10px; padding:8px 18px; font-weight:800; font-size:13px; cursor:pointer; }
  .invite-code-hint{ font-size:12px; color:var(--lilac); margin: 10px 0 0; }

  .parents-dash-error{ text-align:center; padding: 30px 10px; }
  .parents-dash-error p{ color:var(--cream); opacity:.9; font-size:14.5px; margin-bottom:14px; }

  .parents-clinical-locked{ background: rgba(240,200,120,.08); border:2px dashed var(--sand); border-radius:18px; padding:26px 22px; text-align:center; }
  .parents-clinical-locked .locked-icon{ font-size:32px; margin-bottom:8px; }
  .parents-clinical-locked .locked-title{ font-family:'Baloo 2',cursive; font-weight:700; font-size:16px; color:var(--sand); margin-bottom:8px; }
  .parents-clinical-locked .locked-desc{ font-size:13px; color:var(--cream); opacity:.85; line-height:1.55; margin:0 auto 18px; max-width:420px; }

  .parents-danger-zone{ background: rgba(229,85,110,.08); border:2px solid rgba(229,85,110,.4); border-radius:18px; padding:18px 20px; text-align:center; }
  .parents-danger-zone .danger-desc{ font-size:12.5px; color:var(--cream); opacity:.85; line-height:1.5; margin:0 auto 14px; max-width:420px; }
  .parents-reset-btn{ background:transparent; border:2px solid var(--berry); color:#FFA3B1; font-weight:800; font-size:13px; padding:9px 18px; border-radius:12px; cursor:pointer; }
  .parents-reset-btn:hover{ background: rgba(229,85,110,.15); }
  .parents-reset-btn:disabled{ opacity:.6; cursor:default; }

  .delete-account-link{ background:none; border:none; color:#8A8067; font-size:12px; font-weight:700; text-decoration:underline; cursor:pointer; padding:4px; opacity:.8; }
  .delete-account-link:hover{ opacity:1; color:var(--berry); }

  .confirm-modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:10000; padding:20px; }
  .confirm-modal{ background:var(--cream); color:var(--ink); border-radius:var(--radius-lg); padding:26px 24px; max-width:420px; width:100%; box-shadow:var(--shadow); }
  .confirm-modal h3{ margin:0 0 12px; font-size:18px; color:var(--berry); font-family:'Baloo 2',cursive; }
  .confirm-modal p{ margin:0 0 18px; font-size:14px; line-height:1.5; }
  .confirm-modal-input{ width:100%; box-sizing:border-box; padding:10px 14px; border-radius:10px; border:2px solid rgba(11,61,46,.25); font-size:15px; font-weight:800; text-align:center; letter-spacing:1px; margin-bottom:16px; font-family:'Nunito',sans-serif; }
  .confirm-modal-actions{ display:flex; gap:10px; justify-content:flex-end; }
  .confirm-modal-btn-secondary{ background:transparent; border:2px solid rgba(11,61,46,.2); color:var(--ink); font-weight:800; padding:9px 16px; border-radius:12px; cursor:pointer; font-size:13.5px; }
  .confirm-modal-btn-danger{ background:var(--berry); border:none; color:#fff; font-weight:800; padding:9px 18px; border-radius:12px; cursor:pointer; font-size:13.5px; }
  .confirm-modal-btn-danger:disabled{ opacity:.5; cursor:default; }

  /* ---------- STICKER ALBUM ---------- */
  .album-summary{ text-align:center; font-weight:800; color:var(--sand); margin-bottom:16px; font-size:15px; }
  .album-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(108px,1fr)); gap:14px; }
  .sticker-card{ aspect-ratio:1; border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:10px; text-align:center; border:3px solid; transition: transform .12s ease; }
  .sticker-card.unlocked{ background: var(--cream); }
  .sticker-card.locked{ background: rgba(255,255,255,.06); cursor:pointer; }
  .sticker-card.locked:hover{ transform: translateY(-3px); }
  .sticker-card .sticker-emoji{ font-size:36px; }
  .sticker-card .sticker-emoji.locked-emoji{ filter: grayscale(1) brightness(.55); opacity:.6; }
  .sticker-card .sticker-name{ font-weight:800; font-size:12px; color:var(--ink); }
  .sticker-card .sticker-price{ font-weight:800; font-size:12.5px; color:var(--sand); }
  .sticker-card.tier-bronze{ border-color:#BE8C5D; }
  .sticker-card.tier-silver{ border-color:#C7CDD6; }
  .sticker-card.tier-gold{ border-color:var(--sand); }
  .sticker-card.tier-legendary{ border-color:var(--papaya); box-shadow: 0 0 16px rgba(242,112,60,.5); }

  /* ---------- PROFESSIONAL AUTH TOGGLE ---------- */
  .auth-pro-toggle{ display:block; text-align:center; margin-top:14px; font-size:12.5px; color:rgba(255,255,255,.4); cursor:pointer; text-decoration:underline; background:none; border:none; font-family:inherit; font-weight:700; }
  .auth-pro-toggle:hover{ color:rgba(255,255,255,.75); }
  .auth-pro-mode-badge{ display:inline-flex; align-items:center; gap:6px; background:rgba(107,191,163,.15); border:1px solid rgba(107,191,163,.3); border-radius:999px; padding:4px 14px; color:rgba(180,230,215,.9); font-size:11.5px; font-weight:800; margin-bottom:10px; }
  .prof-dash-shell{ background:#FBF8F1; border-radius: var(--radius-lg); overflow:hidden; }

  /* ---------- PAINEL PROFISSIONAL ---------- */
  /* Paleta clara própria (não usa os tokens escuros do app): sinaliza visualmente
     que este é um portal externo, separado da experiência de jogo da criança. */
  .prof-dash-shell{ border-radius: var(--radius-lg); overflow:hidden; box-shadow: var(--shadow); }
  .prof-dash { font-family: 'Nunito', sans-serif; background: #FBF8F1; min-height: 100%; }
  .prof-dash-topbar { background: #123C3E; padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .prof-dash-title { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 20px; color: #fff; }
  .prof-dash-subtitle { font-size: 12.5px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .prof-dash-lang-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .prof-dash-body { display: flex; min-height: 480px; flex-wrap: wrap; }
  .prof-dash-sidebar { width: 220px; border-right: 1px solid #E7DCC0; padding: 16px 0; flex-shrink: 0; }
  .prof-dash-sidebar-label { font-size: 11.5px; color: #8A8067; font-weight: 700; padding: 0 18px 10px; text-transform: uppercase; }
  .prof-dash-child-btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: transparent; border: none; border-left: 3px solid transparent; text-align: left; cursor: pointer; }
  .prof-dash-child-btn.active { background: #F5E6C8; border-left-color: #FF6F59; }
  .prof-dash-child-name { font-size: 13.5px; font-weight: 700; color: #1F2E29; }
  .prof-dash-pending-tag { font-size: 10.5px; color: #FF6F59; font-weight: 700; }
  .prof-dash-redeem { margin-top: 18px; padding: 0 18px; }
  .prof-dash-redeem-input { width: 100%; box-sizing: border-box; border: 1px solid #E7DCC0; border-radius: 10px; padding: 8px 10px; font-size: 12.5px; margin-bottom: 8px; font-family: 'Nunito', sans-serif; }
  .prof-dash-redeem-btn { width: 100%; background: #123C3E; color: #fff; border: none; border-radius: 10px; padding: 9px; font-weight: 700; font-size: 12.5px; cursor: pointer; }
  .prof-dash-redeem-btn:disabled { opacity: .6; cursor: default; }
  .prof-dash-redeem-msg { font-size: 11.5px; margin-top: 8px; line-height: 1.4; }
  .prof-dash-redeem-msg.success { color: #4F7C64; font-weight: 700; }
  .prof-dash-redeem-msg.error { color: #FF6F59; font-weight: 700; }
  .prof-dash-detail { flex: 1; min-width: 260px; padding: 22px 28px; }
  .prof-dash-card { background: #fff; border: 1px solid #E7DCC0; border-radius: 16px; padding: 18px; margin-bottom: 16px; }
  .prof-dash-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .prof-dash-card-title { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 14.5px; color: #1F2E29; }
  .prof-dash-row { display: flex; justify-content: space-between; font-size: 12.5px; padding: 4px 0; }
  .prof-dash-row-label { color: #8A8067; }
  .prof-dash-row-value { font-weight: 700; color: #1F2E29; }
  .prof-dash-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .prof-dash-footer { border-top: 1px solid #E7DCC0; padding: 12px 28px; font-size: 11.5px; color: #8A8067; }
  .prof-dash-bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 100px; padding-top: 10px; }
  .prof-dash-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .prof-dash-bar { width: 100%; background: #6FA287; border-radius: 4px 4px 0 0; min-height: 2px; }
  .prof-dash-bar-label { font-size: 10px; color: #8A8067; }
  .prof-dash-impulsivity-badge { font-size: 28px; font-weight: 700; font-family: 'Baloo 2', sans-serif; }
  .prof-dash-star { font-size: 12px; }
</style>
</head>
<body>

<div class="app">

  <div class="hub-header" id="hubHeader" style="display:none;">
    <div class="brand"><h1>🌴 <span id="appTitle">Ilha do Foco</span></h1><p id="appTag">Aventuras com a Kapi</p></div>
    <div class="top-actions">
      <div class="lang-toggle">
        <button id="langBtnPt" onclick="setLang('pt')">🇧🇷</button>
        <button id="langBtnIt" onclick="setLang('it')">🇮🇹</button>
      </div>
      <div class="seeds">🌰 <span id="seedCount">0</span> <span id="seedsLabel">sementes de foco</span></div>
      <div class="profile-chip"><span class="av" id="chipAvatar">🦫</span><span id="chipName">—</span></div>
      <button class="icon-btn" id="albumBtn" onclick="openAlbum()">🖼️ <span id="albumBtnLabel"></span></button>
      <button class="icon-btn" id="parentsAreaBtn" onclick="openParents()">🔒 <span id="parentsAreaBtnLabel"></span></button>
      <button class="icon-btn" id="switchProfileBtn" onclick="goProfiles()">Trocar perfil</button>
      <button class="icon-btn" id="headerLogoutBtn" onclick="handleLogout()">🚪 <span id="headerLogoutBtnLabel"></span></button>
    </div>
  </div>

  <div id="globalError" class="global-error"></div>

  <!-- ===================== AUTH SCREEN (Responsáveis) ===================== -->
  <div class="screen active" id="screen-auth">
    <div style="display:flex; justify-content:center; padding:15px 0;">
      <div class="lang-toggle" style="border-color: rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);">
        <button id="authLangBtnPt" onclick="setAuthLang('pt')" class="active">🇧🇷</button>
        <button id="authLangBtnIt" onclick="setAuthLang('it')">🇮🇹</button>
      </div>
    </div>
    <div class="auth-box">
      <h2 id="authTitle" style="font-family:'Nunito',sans-serif; font-weight:800;">Área dos Responsáveis</h2>
      <p id="authSubtitle">Acesse para sincronizar o progresso</p>
      <div class="auth-error" id="authError"></div>
      <div class="auth-form">
        <label id="authFullNameLabel" style="display:none;">Nome completo</label>
        <input type="text" id="authFullName" placeholder="Seu nome completo" autocomplete="name" style="display:none;">
        <label id="authRoleLabel" style="display:none;">Função</label>
        <select id="authRole" style="display:none;">
          <option value="logopedista" id="authRoleOptLogopedista"></option>
          <option value="psicologo" id="authRoleOptPsicologo"></option>
          <option value="professor" id="authRoleOptProfessor"></option>
          <option value="outro" id="authRoleOptOutro"></option>
        </select>
        <label id="authLicenseLabel" style="display:none;">Registro profissional</label>
        <input type="text" id="authLicense" autocomplete="off" style="display:none;">
        <label id="authOrgLabel" style="display:none;">Instituição/clínica</label>
        <input type="text" id="authOrg" autocomplete="organization" style="display:none;">
        <label id="authEmailLabel">E-mail</label>
        <input type="email" id="authEmail" placeholder="seu@email.com" autocomplete="email">
        <label id="authPasswordLabel">Senha</label>
        <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password">
        <label id="authConfirmPasswordLabel" style="display:none;">Confirmar senha</label>
        <input type="password" id="authConfirmPassword" placeholder="Digite a senha novamente" autocomplete="new-password" style="display:none;">
        <div class="auth-actions">
          <button class="big-cta" id="authSubmitBtn" onclick="handleAuthSubmit()">Entrar</button>
          <button class="auth-toggle" id="authToggleBtn" onclick="toggleAuthMode()">Não tem conta? Cadastre-se</button>
          <button class="auth-toggle" id="authForgotBtn" onclick="handleForgotPassword()" style="font-size:12px; margin-top:2px;">Esqueci minha senha</button>
        </div>
      </div>
      <div class="auth-divider" id="authGoogleDivider"><span id="authGoogleDividerLabel">ou</span></div>
      <button type="button" class="auth-google-btn" id="authGoogleBtn" onclick="handleGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
        <span id="authGoogleBtnLabel">Continuar com Google</span>
      </button>
    </div>
    <div id="authPrivacyNote" style="text-align:center; font-size:12.5px; color:rgba(255,255,255,0.3); max-width:380px; margin:0 auto; padding:0 20px;"></div>
    <div id="authLegalConsent" style="text-align:center; font-size:12px; color:rgba(255,255,255,0.55); max-width:380px; margin:10px auto 0; padding:0 20px; line-height:1.5;"></div>
    <div style="text-align:center; margin-top:20px; padding-bottom:20px;">
      <button class="auth-pro-toggle" id="authProToggle" onclick="toggleAuthUserType()">Entrar como profissional</button>
    </div>
  </div>

  <!-- ===================== PROFILES SCREEN ===================== -->

// Two-step "type the word to confirm" modal, used for irreversible actions
// (account deletion). Step 1 explains what's about to be lost; step 2 only
// unlocks the final button once the exact confirm word has been typed.
function openDeleteAccountModal({ warningHtml, onConfirm }){
  const t = L().deleteModal;
  const overlay = document.createElement('div');
  overlay.className = 'confirm-modal-overlay';
  overlay.innerHTML = `
    <div class="confirm-modal">
      <div data-step="1">
        <h3>⚠️ ${t.title}</h3>
        <p>${warningHtml}</p>
        <div class="confirm-modal-actions">
          <button type="button" class="confirm-modal-btn-secondary" data-action="cancel">${t.cancelBtn}</button>
          <button type="button" class="confirm-modal-btn-danger" data-action="continue">${t.continueBtn}</button>
        </div>
      </div>
      <div data-step="2" style="display:none;">
        <h3>⚠️ ${t.title}</h3>
        <p>${t.typeToConfirmLabel}</p>
        <input type="text" class="confirm-modal-input" id="deleteAccountConfirmInput" autocomplete="off" autocapitalize="characters">
        <div class="confirm-modal-actions">
          <button type="button" class="confirm-modal-btn-secondary" data-action="cancel">${t.cancelBtn}</button>
          <button type="button" class="confirm-modal-btn-danger" data-action="confirm" disabled>${t.finalBtn}</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = ()=> overlay.remove();
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) close(); });
  overlay.querySelectorAll('[data-action="cancel"]').forEach(btn=> btn.onclick = close);
  overlay.querySelector('[data-action="continue"]').onclick = ()=>{
    overlay.querySelector('[data-step="1"]').style.display = 'none';
    overlay.querySelector('[data-step="2"]').style.display = 'block';
    overlay.querySelector('#deleteAccountConfirmInput').focus();
  };

  const input = overlay.querySelector('#deleteAccountConfirmInput');
  const confirmBtn = overlay.querySelector('[data-action="confirm"]');
  input.addEventListener('input', ()=>{
    confirmBtn.disabled = input.value.trim().toUpperCase() !== t.confirmWord;
  });
  confirmBtn.onclick = async ()=>{
    confirmBtn.disabled = true;
    confirmBtn.textContent = t.deleting;
    await onConfirm(close);
  };
}

function getAuthErrorMsg(errCode) {
  const t = AUTH_I18N[state.lang] || AUTH_I18N.pt;
  if (!errCode) return t.errorGeneric;
  const lower = errCode.toLowerCase();
  if (lower.includes('email_not_confirmed') || lower.includes('email not confirmed')) return t.errorEmailNotConfirmed;
  if (errCode.includes('invalid_credentials')) return t.errorInvalidCredentials;
  if (errCode.includes('user_already_exists')) return t.errorEmailInUse;
  if (errCode.includes('weak_password')) return t.errorWeakPassword;
  if (errCode.includes('network') || errCode.includes('fetch')) return t.errorNetwork;
  return t.errorGeneric;
}

async function handleGoogleLogin() {
  const t = AUTH_I18N[state.lang] || AUTH_I18N.pt;
  const btn = document.getElementById('authGoogleBtn');
  btn.disabled = true;
  try {
    // signInWithOAuth navigates the whole page to Google on success, so
    // there's no session to handle here - onAuthStateChange picks it up
    // (via detectSessionInUrl) the same way it already does for email
    // login, once Google redirects back.
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      // Matches the exact (no trailing slash, no wildcard) entry already
      // whitelisted in Supabase's Redirect URLs for this domain.
      options: { redirectTo: window.location.origin },
    });
    if (error) throw error;
  } catch (err) {
    btn.disabled = false;
    showError(t.googleLoginError);
  }
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    state.authUserId = session.user.id;

    // -- Verificação de profissional (antes da lógica de família) --
    const { data: profRow } = await sb.from('professionals').select('id').eq('auth_user_id', session.user.id).maybeSingle();
    if (profRow) {
      state.isProfessional = true;
      profDashboardSelectedId = null;
      openProfessionalDashboard();
      return;
    }

    // First session ever seen for a professional signup (whether that's
    // immediate, with email confirmation off, or delayed until the user
    // clicks the confirmation link): the row couldn't be created at signUp
    // time because no session - and therefore no RLS-usable auth.uid() -
    // existed yet, so it's created here from the metadata signUp() stashed.
    if (session.user.user_metadata?.signup_type === 'professional') {
      const meta = session.user.user_metadata;
      const profPayload = {
        auth_user_id: session.user.id,
        full_name: meta.full_name,
        role: meta.role,
        license_number: meta.license_number || null,
        organization_name: meta.organization_name || null,
      };
      let { error: profError } = await sb.from('professionals').insert(profPayload);
      const isDuplicate = (err) => err?.message?.includes('duplicate key');
      if (profError && !isDuplicate(profError)) {
        // Best-effort single retry for a transient failure; a duplicate-key
        // error means another onAuthStateChange firing already created it
        // (harmless - the unique constraint on auth_user_id makes that safe).
        ({ error: profError } = await sb.from('professionals').insert(profPayload));
      }
      if (!profError || isDuplicate(profError)) {
        state.isProfessional = true;
        profDashboardSelectedId = null;
        openProfessionalDashboard();
        return;
      }
      // Genuine, non-duplicate failure: don't fall through to family
      // creation below - that would silently turn a professional signup
      // into a stray family account instead of surfacing the real problem.
      showError((AUTH_I18N[state.lang] || AUTH_I18N.pt).errorProfOrphaned);
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-auth').classList.add('active');
      renderAuthScreen();
      return;
    }
    state.isProfessional = false;

    // -- Lógica de família (fluxo existente) --
    const { data: familyList, error } = await sb.from('families').select('id, parent_pin_hash').eq('auth_user_id', session.user.id).limit(1);
    const family = familyList && familyList.length > 0 ? familyList[0] : null;
    if (family) {
      state.familyId = family.id;
      state.familyPinHash = family.parent_pin_hash || null;
    } else {
      const { data: newFamily, err } = await sb.from('families').insert({ auth_user_id: session.user.id }).select('id, parent_pin_hash').single();
      if(newFamily){ state.familyId = newFamily.id; state.familyPinHash = newFamily.parent_pin_hash || null; }
    }
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-profiles').classList.add('active');
    renderProfilesScreen();
  } else {

async function handleAuthSubmit() {
  if (authUserType === 'professional' && authMode === 'signup') {
    return handleProfessionalSignup();
  }

  const t = AUTH_I18N[state.lang] || AUTH_I18N.pt;
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const confirmPassword = document.getElementById('authConfirmPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';

  if(!email || (authMode !== 'reset' && !password)) {
    errEl.textContent = t.errorInvalidCredentials;
    errEl.style.display = 'block';
    return;
  }

  if (authMode === 'signup' && password !== confirmPassword) {
    errEl.textContent = t.errorPasswordMismatch;
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('authSubmitBtn');
  const originalText = btn.textContent;
  btn.textContent = authMode === 'signup' ? t.loadingSignup : (authMode === 'login' ? t.loadingLogin : '...');
  btn.disabled = true;

  let error = null;
  if (authMode === 'signup') {
    const res = await sb.auth.signUp({ email, password, options: { data: { signup_type: 'family' } } });
    error = res.error;
    // With email confirmation required, signUp() succeeds but returns no
    // session until the link is clicked - onAuthStateChange won't fire, so
    // nothing else happens automatically here. Tell the user to go check
    // their inbox instead of leaving them looking at an unchanged screen.
    if (!error && !res.data?.session) {
      errEl.style.color = '#B8E8B0';
      errEl.style.backgroundColor = 'rgba(124,197,118,.2)';
      errEl.style.borderColor = 'var(--success)';
      errEl.textContent = t.confirmationSentMessage;
      errEl.style.display = 'block';
      btn.textContent = originalText;
      btn.disabled = false;
      return;
    }
  } else if (authMode === 'login') {
    const res = await sb.auth.signInWithPassword({ email, password });
    error = res.error;
  } else if (authMode === 'reset') {
    const res = await sb.auth.resetPasswordForEmail(email);
    error = res.error;
    if(!error) {
      errEl.style.color = '#B8E8B0';
      errEl.style.backgroundColor = 'rgba(124,197,118,.2)';
      errEl.style.borderColor = 'var(--success)';
      errEl.textContent = t.resetSentMessage;
      errEl.style.display = 'block';
      btn.textContent = originalText;
      btn.disabled = false;
      return;
    }
  }
  
  if (error) {
    errEl.style.color = '#FFA3B1';
    errEl.style.backgroundColor = 'rgba(229,85,110,.2)';
    errEl.style.borderColor = 'var(--berry)';
    errEl.textContent = getAuthErrorMsg(error.message || error.code);
    errEl.style.display = 'block';
  }
  
  btn.textContent = originalText;
  btn.disabled = false;
}

async function handleProfessionalSignup(){
  const t = AUTH_I18N[state.lang] || AUTH_I18N.pt;
  const fullName = document.getElementById('authFullName').value.trim();
  const role = document.getElementById('authRole').value;
  const license = document.getElementById('authLicense').value.trim();
  const org = document.getElementById('authOrg').value.trim();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const confirmPassword = document.getElementById('authConfirmPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';

  if(!fullName){
    errEl.textContent = t.errorFullNameRequired;
    errEl.style.display = 'block';
    return;
  }
  if(!email || !password){
    errEl.textContent = t.errorInvalidCredentials;
    errEl.style.display = 'block';
    return;
  }
  if(password !== confirmPassword){
    errEl.textContent = t.errorPasswordMismatch;
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('authSubmitBtn');
  const originalText = btn.textContent;
  btn.textContent = t.proLoadingSignup;
  btn.disabled = true;

  try{
    // The professionals row isn't created here - it's created by
    // onAuthStateChange from this metadata, the first time a real session
    // shows up for this user (immediately if email confirmation is off,
    // or after they click the confirmation link if it's on). That's the
    // only point a session - and therefore an RLS-usable auth.uid() - is
    // guaranteed to exist, and it works the same way regardless of the
    // project's confirm-email setting.
    const { data: authData, error: authError } = await sb.auth.signUp({
      email, password,
      options: { data: {
        signup_type: 'professional',
        full_name: fullName,
        role,
        license_number: license || null,
        organization_name: org || null,
      } }
    });
    if(authError){
      errEl.style.color = '#FFA3B1';
      errEl.style.backgroundColor = 'rgba(229,85,110,.2)';
      errEl.style.borderColor = 'var(--berry)';
      errEl.textContent = getAuthErrorMsg(authError.message || authError.code);
      errEl.style.display = 'block';
      return;
    }

    if(!authData.session){
      errEl.style.color = '#B8E8B0';
      errEl.style.backgroundColor = 'rgba(124,197,118,.2)';
      errEl.style.borderColor = 'var(--success)';
      errEl.textContent = t.confirmationSentMessage;
      errEl.style.display = 'block';
      return;
    }
    // Auto-confirm is on: a session already exists, so onAuthStateChange
    // has already started (or is about to) creating the professionals row
    // and routing to the dashboard on its own - nothing left to do here.
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

function speak(text, rate){
  if(!('speechSynthesis' in window) || !text) return;
  const clean = String(text)
    .replace(/<[^>]+>/g, ' ')
    .replace(/\p{Extended_Pictographic}/gu, '') // skip emoji (stars, hearts, etc.) so the voice doesn't try to describe them
    .replace(/\s+/g,' ').trim();
  if(!clean) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = state.lang === 'it' ? 'it-IT' : 'pt-BR';
  u.rate = rate || 0.9;
  window.speechSynthesis.speak(u);
}

// v_recommended_difficulty looks at the child's last 15 answers for this game
// and suggests 'subir'/'descer'/'manter'/'dados_insuficientes'. Moves at most
// one step per session so a single noisy round can't cause a sudden jump.
async function adjustDifficultyForSession(gameKey){
  if(!state.profileId) return;
  try{
    const { data, error } = await sb.from('v_recommended_difficulty')
      .select('recomendacao').eq('profile_id', state.profileId).eq('game_key', gameKey).maybeSingle();
    if(error) throw error;
    if(!data || data.recomendacao === 'manter' || data.recomendacao === 'dados_insuficientes') return;
    const idx = DIFF_LEVELS.indexOf(getDifficulty(gameKey));
    if(data.recomendacao === 'subir' && idx < DIFF_LEVELS.length - 1) setDifficulty(gameKey, DIFF_LEVELS[idx+1]);
    else if(data.recomendacao === 'descer' && idx > 0) setDifficulty(gameKey, DIFF_LEVELS[idx-1]);
  }catch(e){ /* best-effort; keep whatever difficulty is already set */ }
}
async function openGame(key){

  sessionSeedsStart[key] = state.profile.seeds;
  sessionDirty[key] = false;
  currentSessionId = crypto.randomUUID();
  sessionCompleted = false;
  await adjustDifficultyForSession(key);
  startSessionRow(key, currentSessionId);

  if(key==='memoria') simonInit();

let sem = { round:0, hits:0, total:5, canGo:false, cfg:null };
function semInit(){
  const t = L();
  document.getElementById('semTitle').textContent = t.sem.title;
  setInstructions('semInstructions', t.sem.instr, true);
  document.getElementById('semStartBtn').textContent = t.startBtn;
  document.getElementById('semPreStart').style.display = 'flex';
  document.getElementById('semPlayArea').style.display = 'none';
  hideFeedback('semFeedback');
  renderDiffRow('semDiffRow', 'semaforo');
}
function semStart(){
  const t = L();
  sem.cfg = DIFF.semaforo[getDifficulty('semaforo')];
  sem.round = 0; sem.hits = 0; sem.total = sem.cfg.rounds; sem.canGo = false;
  document.getElementById('semPreStart').style.display = 'none';
  document.getElementById('semPlayArea').style.display = 'flex';
  document.getElementById('semRounds').innerHTML = Array.from({length:sem.total}).map(()=>'<div class="round-dot"></div>').join('');
  semNextRound();
}
function semNextRound(){
  clearTimeout(window._semTimer);
  const t = L();
  const light = document.getElementById('semLight');
  if(sem.round >= sem.total){ semEnd(); return; }
  light.className = 'light-circle wait'; light.textContent = t.sem.wait; sem.canGo = false;
  const waitTime = sem.cfg.waitMin + Math.random()*(sem.cfg.waitMax - sem.cfg.waitMin);
  window._semTimer = setTimeout(()=>{
    light.className = 'light-circle go'; light.textContent = t.sem.go; sem.canGo = true;
    window.instructionEndedAt = Date.now();
    window._semTimer = setTimeout(()=>{ 
      if(sem.canGo){ 
        sem.canGo = false; 
        logGameEvent({ eventType: 'answer', targetType: 'light', correct: false, errorType: 'omissao' });
        markRound(false); 
      } 
    }, sem.cfg.greenMs);
  }, waitTime);
}
function semTap(){
  if(sem.round >= sem.total) return;
  if(sem.canGo){ 
    const rt = Date.now() - window.instructionEndedAt;
    sem.canGo = false; 
    logGameEvent({ eventType: 'answer', targetType: 'light', correct: true, responseTimeMs: rt });
    markRound(true); 
  }
  else { 
    logGameEvent({ eventType: 'premature_click', targetType: 'light' });
    showFeedback('semFeedback', L().sem.early, false); setTimeout(()=>hideFeedback('semFeedback'), 1100); 
  }
}
function markRound(hit){
  clearTimeout(window._semTimer);
  const t = L();
  const dots = document.querySelectorAll('#semRounds .round-dot');
  dots[sem.round].classList.add(hit?'hit':'miss');
  if(hit){ sem.hits++; showFeedback('semFeedback', t.sem.hit, true); } else { showFeedback('semFeedback', t.sem.miss, false); }
  sem.round++;
  setTimeout(()=>{ hideFeedback('semFeedback'); semNextRound(); }, 900);
}
function semEnd(){
  sessionCompleted = true;
  logGameEvent({ eventType: 'activity_complete' });
  const t = L();
  const light = document.getElementById('semLight');
  light.className = 'light-circle go'; light.textContent = '🎉';

let simon = { sequence:[], input:[], level:1, playing:false, cfg:null, locked:false };
function simonInit(){
  const t = L();

  setInstructions('memInstructions', t.mem.instr, true);
  document.getElementById('memStartBtn').textContent = t.startBtn;

  document.getElementById('memPlayArea').style.display = 'none';

function simonStart(){
  simon.cfg = DIFF.memoria[getDifficulty('memoria')];
  document.getElementById('memPreStart').style.display = 'none';
  document.getElementById('memPlayArea').style.display = 'flex';
  simon.sequence = Array.from({length: simon.cfg.startLen}, ()=>Math.floor(Math.random()*4));
  simon.level = 1;
  simonPlaySequence();
}
function simonSetLocked(locked){
  document.querySelectorAll('.trail-pad').forEach(p=>p.classList.toggle('locked', locked));
}
function simonRenderFootprints(litCount){
  const el = document.getElementById('trailFootprints');
  el.innerHTML = '';
  for(let i=0;i<simon.sequence.length;i++){
    const span = document.createElement('span');
    span.textContent = '👣';
    if(i < litCount) span.classList.add('done');
    el.appendChild(span);
  }
}
function simonPlaySequence(){
  const t = L();
  simon.playing = true; simon.input = []; simon.locked = false;
  document.getElementById('simonLevel').textContent = t.mem.level(simon.level);
  hideFeedback('simonFeedback');
  simonRenderFootprints(0);
  simonSetLocked(true);
  let i = 0;
  const pads = document.querySelectorAll('.trail-pad');
  function step(){
    if(i>0) pads[simon.sequence[i-1]].classList.remove('lit');
    if(i >= simon.sequence.length){ 
      simon.playing = false; 
      simonSetLocked(false); 
      window.instructionEndedAt = Date.now();
      return; 
    }
    pads[simon.sequence[i]].classList.add('lit');
    i++;
    setTimeout(step, simon.cfg.stepDelay);
  }
  setTimeout(step, 500);
}
function simonInput(padIndex){
  if(simon.playing || simon.locked) {
    if (simon.playing) logGameEvent({ eventType: 'premature_click' });
    return;
  }
  if(simon.input.length >= simon.sequence.length) return;
  const rt = Date.now() - (window.instructionEndedAt || Date.now());
  window.instructionEndedAt = Date.now(); // reset timer for next input in sequence
  simon.locked = true;
  setTimeout(()=>{ simon.locked = false; }, 280);
  const t = L();
  const pads = document.querySelectorAll('.trail-pad');
  pads[padIndex].classList.add('lit');
  setTimeout(()=>pads[padIndex].classList.remove('lit'), 250);
  simon.input.push(padIndex);
  const idx = simon.input.length - 1;
  const isCorrect = simon.input[idx] === simon.sequence[idx];
  let errorType = null;
  if (!isCorrect && rt < 400) errorType = 'impulsiva';
  logGameEvent({ eventType: 'answer', targetType: 'sequence', target: simon.sequence.join(''), responseValue: simon.input.join(''), correct: isCorrect, responseTimeMs: rt, errorType });

  if(!isCorrect){
    simon.playing = true;
    showFeedback('simonFeedback', t.mem.wrong, false);
    const stars = simon.level-1 >= Math.ceil(simon.cfg.maxLevel*0.7) ? 3 : simon.level-1 >= Math.ceil(simon.cfg.maxLevel*0.4) ? 2 : simon.level-1>=1?1:0;
    setStars('memoria', stars);
    setTimeout(()=>simonPlaySequence(), 1400);
    return;
  }
  simonRenderFootprints(simon.input.length);
  if(simon.input.length === simon.sequence.length){
    simon.playing = true;
    if(simon.level >= simon.cfg.maxLevel){
      sessionCompleted = true;
      logGameEvent({ eventType: 'activity_complete' });
      showFeedback('simonFeedback', t.mem.mastery, true);
      setStars('memoria', 3); addSeeds(10); say(t.mascotGood);
      return;
    }
    showFeedback('simonFeedback', t.mem.next, true);
    addSeeds(2);
    simon.level++;
    simon.sequence.push(Math.floor(Math.random()*4));
    setTimeout(()=>simonPlaySequence(), 1200);
  }
}
document.getElementById('simonGrid').addEventListener('pointerdown', function(e){
  if(!e.isPrimary) return; // ignore incidental secondary touches (palm/other finger) so they can't hijack the sequence
  const pad = e.target.closest('.trail-pad');
  if(!pad) return;
  e.preventDefault();
  simonInput(Number(pad.dataset.i));
});

let story = { correct:[], shuffled:[], answer:[], title:'', lastPickIdx:null, lastWasPerfect:true };
function storyInit(){
  const t = L();
  document.getElementById('storyTitle').textContent = t.story.title;
  document.getElementById('storyStartBtn').textContent = t.startBtn;
  document.getElementById('storyResetBtn').textContent = t.playAgainBtn;
  document.getElementById('storyPreStart').style.display = 'flex';
  document.getElementById('storyPlayArea').style.display = 'none';
  document.getElementById('storyResetBtn').style.display = 'none';
  setInstructions('storyInstructions', t.story.instr('...'), true);
  hideFeedback('storyFeedback');
  renderDiffRow('storyDiffRow', 'historia');
}
function storyStart(){
  const t = L();
  const cfg = DIFF.historia[getDifficulty('historia')];
  const bank = STORY_BANK[state.lang];
  let idx;
  if(!story.lastWasPerfect && story.lastPickIdx !== null && bank[story.lastPickIdx]){
    idx = story.lastPickIdx; // retry the same story after a wrong/partial attempt
  } else {
    do { idx = Math.floor(Math.random()*bank.length); } while(bank.length > 1 && idx === story.lastPickIdx);
  }
  story.lastPickIdx = idx;
  const pick = bank[idx];
  story.title = pick.title;
  story.correct = pick.cards.slice(0, cfg.len);
  story.answer = [];
  story.shuffled = [...story.correct].sort(()=>Math.random()-0.5);
  setInstructions('storyInstructions', t.story.instr(pick.title), true);
  document.getElementById('storyPreStart').style.display = 'none';
  document.getElementById('storyPlayArea').style.display = 'flex';
  document.getElementById('storyResetBtn').style.display = 'none';
  hideFeedback('storyFeedback');
  renderStoryCards(); renderStoryAnswer();
  window.instructionEndedAt = Date.now();
}
function renderStoryCards(){
  const wrap = document.getElementById('storyCards');
  wrap.innerHTML = '';
  story.shuffled.forEach(emoji=>{
    const used = story.answer.includes(emoji);
    const card = document.createElement('div');
    card.className = 'story-card';
    card.textContent = emoji;
    card.style.opacity = used ? '0.35' : '1';
    card.style.pointerEvents = used ? 'none' : 'auto';
    card.onclick = ()=>storyPick(emoji);
    wrap.appendChild(card);
  });
}
function renderStoryAnswer(){
  const wrap = document.getElementById('storyAnswer');
  wrap.innerHTML = '';
  for(let i=0;i<story.correct.length;i++){
    const slot = document.createElement('div');
    const filled = story.answer[i] !== undefined;
    slot.className = 'answer-slot' + (filled?' filled':'');
    slot.textContent = filled ? story.answer[i] : (i+1);
    wrap.appendChild(slot);
  }
}
function storyPick(emoji){
  if(story.answer.length >= story.correct.length) return;
  const rt = Date.now() - (window.instructionEndedAt || Date.now());
  window.instructionEndedAt = Date.now();
  story.answer.push(emoji);
  const isCorrect = emoji === story.correct[story.answer.length - 1];
  logGameEvent({ eventType: 'answer', targetType: 'instruction', target: story.title, responseValue: emoji, correct: isCorrect, responseTimeMs: rt });
  renderStoryCards(); renderStoryAnswer();
  if(story.answer.length === story.correct.length) checkStory();
}
function checkStory(){
  const t = L();
  let correctCount = 0;
  for(let i=0;i<story.correct.length;i++) if(story.answer[i] === story.correct[i]) correctCount++;
  const ratio = correctCount/story.correct.length;
  const stars = ratio===1?3: ratio>=0.6?2: ratio>0?1:0;
  setStars('historia', stars);
  sessionCompleted = true;
  logGameEvent({ eventType: 'activity_complete' });
  story.lastWasPerfect = correctCount === story.correct.length;
  if(story.lastWasPerfect){
    showFeedback('storyFeedback', t.story.perfect, true); addSeeds(6); say(t.mascotGood);
  } else {
    showFeedback('storyFeedback', t.story.partial(correctCount, story.correct.length), false); say(t.mascotTry);
  }
  document.getElementById('storyResetBtn').style.display = 'inline-block';
}

  renderChatStep();
}
function renderChatStep(){
  document.getElementById('turnIndicator').style.display = 'none';
  document.getElementById('chatContinueBtn').style.display = 'none';
  if(chat.step >= chat.turns.length){ chatEnd(); return; }
  const s = chat.turns[chat.step];
  setChatBubble(s.line);
  const optWrap = document.getElementById('replyOptions');
  optWrap.innerHTML = '';
  const shuffled = [...s.options].sort(()=>Math.random()-0.5);
  shuffled.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'reply-btn';
    btn.innerHTML = opt.text + (chat.showHint && opt.hint ? `<span class="reply-hint">${opt.hint}</span>` : '');
    btn.onclick = ()=>chatPick(opt);
    btn.appendChild(makeTtsIcon(opt.text));
    optWrap.appendChild(btn);
  });
  window.instructionEndedAt = Date.now();

function chatPick(opt){
  const t = L();
  document.querySelectorAll('.reply-btn').forEach(b=>b.style.pointerEvents='none');
  const rt = Date.now() - (window.instructionEndedAt || Date.now());
  logGameEvent({ eventType: 'answer', targetType: 'dialog', responseValue: opt.text, correct: opt.ok, responseTimeMs: rt });
  if(opt.ok){
    if(!chat.triedThisTurn) chat.firstTryCorrect++;
    showFeedback('chatFeedback', t.chat.correct, true);
    chat.willAdvance = true;
  } else {
    chat.triedThisTurn = true;
    showFeedback('chatFeedback', t.chat.wrong, false);
    chat.willAdvance = false;
  }
  document.getElementById('turnIndicator').style.display = 'flex';
  document.getElementById('chatContinueBtn').style.display = 'inline-block';
}
function chatContinue(){
  document.getElementById('chatContinueBtn').style.display = 'none';
  hideFeedback('chatFeedback');
  if(chat.willAdvance){
    chat.step++;
    chat.triedThisTurn = false;
  }
  renderChatStep(); // same turn repeats if the last answer was wrong, otherwise moves on
}
function chatEnd(){
  sessionCompleted = true;
  logGameEvent({ eventType: 'activity_complete' });
  const t = L();
  setChatBubble(t.chat.closing);
  document.getElementById('replyOptions').innerHTML = '';
  document.getElementById('turnIndicator').style.display = 'none';
  const ratio = chat.firstTryCorrect/chat.turns.length;
  const stars = ratio===1?3: ratio>=0.5?2: ratio>0?1:0;
  setStars('minhavez', stars); addSeeds(chat.firstTryCorrect*3);
  showFeedback('chatFeedback', t.chat.result(chat.firstTryCorrect, chat.turns.length), true);
  say(stars>=2 ? t.mascotGood : t.mascotTry);
}
