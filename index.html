/* ========================= SESSION LOGGING (for parents area) ========================= */
let currentGameKey = null;
let sessionDirty = {};
let sessionSeedsStart = {};
let currentSessionId = null;
let sessionCompleted = false;

async function logGameEvent({ eventType, target = null, targetType = null, responseValue = null, correct = null, responseTimeMs = null, errorType = null, emotion = null, context = null }) {
  if (!state.profileId || !currentSessionId || !currentGameKey) return;
  try {
    const { error } = await sb.from('game_events').insert({
      session_id: currentSessionId,
      profile_id: state.profileId,
      game_key: currentGameKey,
      event_type: eventType,
      target: target,
      target_type: targetType,
      response_value: responseValue,
      correct: correct,
      response_time_ms: responseTimeMs,
      error_type: errorType,
      emotion: emotion,
      context: context
    });
    if (error) console.error('[gameEvents] falha ao gravar evento:', error);
  } catch (e) {}
}

const repeatedTapTimestamps = {};
function trackRepeatedTap(elementId) {
  const now = Date.now();
  if (!repeatedTapTimestamps[elementId]) repeatedTapTimestamps[elementId] = [];
  repeatedTapTimestamps[elementId] = repeatedTapTimestamps[elementId].filter(t => now - t < 1000);
  repeatedTapTimestamps[elementId].push(now);
  if (repeatedTapTimestamps[elementId].length >= 3) {
    logGameEvent({ eventType: 'repeated_tap', target: elementId });
    repeatedTapTimestamps[elementId] = [];
  }
}
document.addEventListener('pointerdown', (e) => {
  if (!currentGameKey) return;
  let id = null;
  const btn = e.target.closest('button, .hunt-cell, .trail-pad, .story-card, .light-circle, .emo-btn');
  if (btn) {
    if (btn.id) id = btn.id;
    else if (btn.className && typeof btn.className === 'string') id = btn.className.split(' ')[0];
  }
  if (id) trackRepeatedTap(id);
});

function flushSessionLog(){
  if(currentGameKey) {
    if(!sessionCompleted && sessionDirty[currentGameKey]) {
      logGameEvent({ eventType: 'abandon' });
    }
    if (sessionDirty[currentGameKey]) logSession(currentGameKey, currentSessionId);
  }
  currentGameKey = null;
  currentSessionId = null;
}
async function logSession(gameKey, sessionId){
  sessionDirty[gameKey] = false;
  if(!state.profileId || !state.familyId || !state.profile || !sessionId) return;
  const stars = state.profile.starsByGame[gameKey] || 0;
  const difficulty = getDifficulty(gameKey);
  const startSeeds = sessionSeedsStart[gameKey] ?? state.profile.seeds;
  const seedsEarned = Math.max(0, state.profile.seeds - startSeeds);
  try{
    const { error } = await sb.from('game_sessions')
      .update({ difficulty, stars, seeds_earned: seedsEarned, end_time: new Date().toISOString() })
      .eq('id', sessionId);
    if(error) throw error;
  }catch(e){ /* best-effort; a failed log shouldn't block gameplay */ }
}

/* ========================= STICKER ALBUM ========================= */
function openAlbum(){
  flushSessionLog();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-album').classList.add('active');
  document.getElementById('albumTitle').textContent = '🖼️ ' + L().album.title;
  setInstructions('albumInstructions', L().album.instr);
  hideFeedback('albumFeedback');
  renderAlbum();
}
function renderAlbum(){
  const t = L();
  const unlocked = state.profile.unlockedStickers || [];
  document.getElementById('albumSummary').textContent = t.album.progress(unlocked.length, STICKERS.length);
  const grid = document.getElementById('albumGrid');
  grid.innerHTML = '';
  STICKERS.forEach(st=>{
    const isUnlocked = unlocked.includes(st.id);
    const name = st.name[state.lang] || st.name.pt;
    const card = document.createElement('div');
    card.className = `sticker-card tier-${st.tier} ${isUnlocked ? 'unlocked' : 'locked'}`;
    if(isUnlocked){
      card.innerHTML = `<span class="sticker-emoji">${st.emoji}</span><span class="sticker-name">${name}</span>`;
    } else {
      card.innerHTML = `<span class="sticker-emoji locked-emoji">${st.emoji}</span><span class="sticker-price">🌰 ${st.price}</span>`;
      card.setAttribute('role', 'button');
      card.tabIndex = 0;
      card.onclick = ()=>attemptUnlock(st.id);
    }
    grid.appendChild(card);
  });
}
function attemptUnlock(id){
  const t = L();
  const st = STICKERS.find(s=>s.id===id);
  if(!st) return;
  if(!state.profile.unlockedStickers) state.profile.unlockedStickers = [];
  if(state.profile.unlockedStickers.includes(id)) return;
  if(state.profile.seeds < st.price){
    showFeedback('albumFeedback', t.album.notEnough(st.price - state.profile.seeds), false);
    return;
  }
  state.profile.seeds -= st.price;
  state.profile.unlockedStickers.push(id);
  document.getElementById('seedCount').textContent = state.profile.seeds;
  saveProfileData();
  renderAlbum();
  const name = st.name[state.lang] || st.name.pt;
  showFeedback('albumFeedback', t.album.unlocked(name, st.emoji), true);
  say(t.mascotGood);
}

/* ========================= PROFESSIONAL DASHBOARD =========================
   Read-only portal for professionals (logopedista/psicólogo/professor) linked
   to a child via professional_child_links. Entered from sb.auth.onAuthStateChange
   when the logged-in user has a row in `professionals`. The parent-side
   "Convidar" button still has no action wired up, so links have to be
   created directly for now. */
let profDashboardChildren = [];
let profDashboardSelectedId = null;

function openProfessionalDashboard(){
  flushSessionLog();
  document.getElementById('hubHeader').style.display = 'none';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-professional').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
  renderProfDashboardBody(document.getElementById('profDashboardContainer'));
}

async function loadProfDashboardChildren(){
  const { data: { user } } = await sb.auth.getUser();
  if(!user) throw new Error('no-session');

  const { data: professional, error: profErr } = await sb.from('professionals').select('id').eq('auth_user_id', user.id).single();
  if(profErr) throw profErr;

  const { data: links, error: linksErr } = await sb.from('professional_child_links')
    .select('id, status, child_profile_id, child_profiles(id, name)').eq('professional_id', professional.id);
  if(linksErr) throw linksErr;

  return (links || []).map(l=>({
    linkId: l.id, status: l.status, childId: l.child_profile_id, name: l.child_profiles?.name || '?'
  }));
}

async function loadProfDashboardChildDetail(childId){
  const [
    { data: profile }, { data: readingProgress }, { data: impulsivity }, { data: adherenceRows },
    { data: swaps }, { data: errorTypes }, { data: syllableDifficulty },
    { data: focusEvolution }, { data: responseTime }, { data: workingMemory },
    { data: ruleAdaptation }, { data: frustration }, { data: waitCompliance }, { data: instructionFollowing }
  ] = await Promise.all([
    sb.from('child_profiles').select('*').eq('id', childId).single(),
    sb.from('reading_progress').select('*').eq('child_profile_id', childId).maybeSingle(),
    sb.from('v_impulsivity_index').select('indice').eq('profile_id', childId).maybeSingle(),
    sb.from('v_adherence_summary').select('game_key, semanas_com_dado, semanas_com_meta_atingida, taxa_adesao_pct').eq('profile_id', childId),
    // v_phonological_swaps/v_error_type_summary/v_syllable_difficulty, and all 7 clinical
    // views below, filter on has_premium_access(profile_id) at the DB level, so an empty
    // array here can mean either "no data yet" or "family isn't premium" - isPremium
    // (fetched below via RPC, since subscriptions itself isn't readable by professionals)
    // disambiguates the two.
    sb.from('v_phonological_swaps').select('expected, answered, occurrences').eq('profile_id', childId).order('occurrences', { ascending:false }).limit(5),
    sb.from('v_error_type_summary').select('error_type, occurrences').eq('profile_id', childId),
    sb.from('v_syllable_difficulty').select('syllable, accuracy_pct').eq('profile_id', childId).lt('accuracy_pct', 100).order('accuracy_pct', { ascending:true }).limit(5),
    sb.from('v_weekly_focus_evolution').select('game_key, week_start, avg_duration_seconds, max_duration_seconds, min_duration_seconds, avg_distractions').eq('profile_id', childId).order('week_start', { ascending:false }),
    sb.from('v_response_time_trend').select('game_key, month, avg_response_time_ms, best_response_time_ms').eq('profile_id', childId).order('month', { ascending:false }),
    sb.from('v_working_memory').select('game_key, longest_correct_sequence, avg_correct_length').eq('profile_id', childId),
    sb.from('v_rule_adaptation').select('game_key, time_to_adapt_ms').eq('profile_id', childId).not('time_to_adapt_ms', 'is', null),
    sb.from('v_frustration_raw').select('game_key, abandons, help_requests, retries').eq('profile_id', childId),
    sb.from('v_wait_task_compliance').select('game_key, waited_correctly, clicked_early, total_attempts').eq('profile_id', childId),
    sb.from('v_instruction_following').select('game_key, followed_correctly, total_instructions, accuracy_pct').eq('profile_id', childId)
  ]);

  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const { data: sessions } = await sb.from('game_sessions').select('start_time, end_time')
    .eq('profile_id', childId).gte('start_time', sevenDaysAgo.toISOString()).not('end_time', 'is', null);

  // subscriptions is only readable by the family itself (RLS), so a professional
  // querying it directly always gets nothing back - use the has_premium_access()
  // RPC instead, which is SECURITY DEFINER and works for both family and professional.
  let isPremium = false;
  try{
    const { data } = await sb.rpc('has_premium_access', { p_child_profile_id: childId });
    isPremium = !!data;
  }catch(e){ /* best-effort; falls back to locked-card copy */ }

  const dayLabels = state.lang === 'it' ? ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'] : ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const usageByDay = dayLabels.map(d=>({ day: d, minutes: 0 }));
  (sessions || []).forEach(s=>{
    const start = new Date(s.start_time), end = new Date(s.end_time);
    usageByDay[start.getDay()].minutes += Math.max(0, (end - start) / 60000);
  });

  return {
    profile, readingProgress, impulsivityIndex: impulsivity?.indice ?? null,
    weeklyUsage: usageByDay.map(d=>({ ...d, minutes: Math.round(d.minutes) })),
    adherence: (adherenceRows || []).filter(a=>a.semanas_com_dado > 0),
    phonologicalSwaps: swaps || [], errorTypes: errorTypes || [], syllableDifficulty: syllableDifficulty || [],
    focusEvolution: focusEvolution || [], responseTime: responseTime || [], workingMemory: workingMemory || [],
    ruleAdaptation: ruleAdaptation || [], frustration: frustration || [],
    waitCompliance: waitCompliance || [], instructionFollowing: instructionFollowing || [],
    isPremium
  };
}

function renderProfStars(count, max = 3){
  let html = '';
  for(let i=0;i<max;i++) html += `<span class="prof-dash-star" style="color:${i < count ? '#C79A3D' : '#D8D0BC'}">★</span>`;
  return html;
}

async function renderProfDashboardBody(container){
  const t = L().prof;
  container.innerHTML = `<div class="prof-dash"><div style="padding:40px; text-align:center; color:#8A8067;">${t.loading}</div></div>`;

  let children;
  try{
    children = await loadProfDashboardChildren();
  }catch(e){
    container.innerHTML = `<div class="prof-dash"><div style="padding:40px; text-align:center; color:#8A8067;">${t.error}</div></div>`;
    return;
  }

  profDashboardChildren = children;
  if(!profDashboardSelectedId && children.some(c=>c.status === 'active')){
    profDashboardSelectedId = children.find(c=>c.status === 'active').childId;

  await renderProfDashboardFrame(container);
}

function renderProfSidebarList(container){
  const t = L().prof;
  const listEl = container.querySelector('#profSidebarList');
  if(!listEl) return;
  listEl.innerHTML = profDashboardChildren.length === 0
    ? `<div style="padding: 12px 18px; font-size: 12.5px; color: #8A8067;">${t.noChildren}</div>`
    : profDashboardChildren.map(c=>`
      <button class="prof-dash-child-btn ${c.childId === profDashboardSelectedId ? 'active' : ''}"
        data-child-id="${c.childId}" ${c.status !== 'active' ? 'disabled' : ''}
        style="opacity:${c.status === 'active' ? 1 : 0.55}">
        <span class="prof-dash-child-name">${c.name}</span>
        ${c.status === 'pending' ? `<span class="prof-dash-pending-tag">${t.pending}</span>` : ''}
      </button>
    `).join('');

  listEl.querySelectorAll('.prof-dash-child-btn:not([disabled])').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      profDashboardSelectedId = btn.dataset.childId;
      await renderProfDashboardFrame(container); // already calls loadAndRenderProfChildDetail when profDashboardSelectedId is set
    });
  });
}

async function handleRedeemInviteCode(container){
  const t = L().prof;
  const input = container.querySelector('#profRedeemInput');
  const btn = container.querySelector('#profRedeemBtn');
  const msgEl = container.querySelector('#profRedeemMsg');
  const code = input.value.trim();
  if(!code) return;
  btn.disabled = true;
  msgEl.textContent = '';
  msgEl.className = 'prof-dash-redeem-msg';
  try{
    const { data, error } = await sb.rpc('redeem_invite_code', { p_code: code });
    if(error) throw error;
    if(data?.success){
      msgEl.textContent = t.redeemSuccess(data.child_name);
      msgEl.className = 'prof-dash-redeem-msg success';
      input.value = '';
      profDashboardChildren = await loadProfDashboardChildren();
      renderProfSidebarList(container);
    } else {
      msgEl.textContent = t.redeemErrors[data?.error] || t.error;
      msgEl.className = 'prof-dash-redeem-msg error';
    }
  }catch(e){
    msgEl.textContent = t.error;
    msgEl.className = 'prof-dash-redeem-msg error';
  }finally{
    btn.disabled = false;
  }
}

async function loadAndRenderProfChildDetail(container){
  const t = L().prof;
  const detailEl = container.querySelector('#profDashDetail');
  if(!detailEl) return;

  let detail;
  try{
    detail = await loadProfDashboardChildDetail(profDashboardSelectedId);
  }catch(e){
    detailEl.innerHTML = `<div style="color:#8A8067;">${t.error}</div>`;
    return;
  }

  const {
    profile, readingProgress, impulsivityIndex, weeklyUsage, adherence, phonologicalSwaps, errorTypes, syllableDifficulty,
    focusEvolution, responseTime, workingMemory, ruleAdaptation, frustration, waitCompliance, instructionFollowing, isPremium
  } = detail;
  const ilhaDoFocoGames = Object.entries(profile?.stars_by_game || {}).filter(([k])=>GAME_KEYS.includes(k));
  const maxMinutes = Math.max(1, ...weeklyUsage.map(d=>d.minutes));
  const gameTitle = (key)=> key === 'aventura_das_letras' ? t.lettersIsland : (L().tiles[key]?.title || key);
  const lockedNote = `<div style="font-size:12.5px; color:#8A8067; line-height:1.5;">${t.lockedBody}</div>`;
  const noDataNote = `<div style="font-size:12.5px; color:#8A8067;">${t.noDataGeneric}</div>`;
  const adherenceRowsHtml = (adherence || []).map(a=>{
    const pct = Math.round(parseFloat(a.taxa_adesao_pct));
    return `<div class="prof-dash-row"><span class="prof-dash-row-label">${gameTitle(a.game_key)}</span><span class="prof-dash-row-value">${pct}% (${a.semanas_com_meta_atingida}/${a.semanas_com_dado} ${t.adherenceGoalMet})</span></div>`;
  }).join('');

  // v_phonological_swaps/v_error_type_summary/v_syllable_difficulty are filtered by
  // has_premium_access() in the DB, so empty here means either "no data yet" (premium,
  // nothing to show) or "family isn't premium" (isPremium tells them apart).
  const hasPhoneticData = syllableDifficulty.length > 0 || phonologicalSwaps.length > 0 || errorTypes.length > 0;
  let phoneticHtml;
  if(!isPremium){
    phoneticHtml = `<div style="font-size:12.5px; color:#8A8067; line-height:1.5;">${t.lockedBody}</div>`;
  } else if(!hasPhoneticData){
    phoneticHtml = `<div style="font-size:12.5px; color:#8A8067;">${t.noPhoneticData}</div>`;
  } else {
    phoneticHtml = `
      ${syllableDifficulty.length ? `
        <div style="margin-bottom:12px;">
          <div style="font-size:11.5px; color:#8A8067; margin-bottom:6px; font-weight:700;">${t.hardestSyllables}</div>
          ${syllableDifficulty.map(s=>`<div class="prof-dash-row"><span class="prof-dash-row-label">${s.syllable}</span><span class="prof-dash-row-value">${s.accuracy_pct}%</span></div>`).join('')}
        </div>` : ''}
      ${phonologicalSwaps.length ? `
        <div style="margin-bottom:12px;">
          <div style="font-size:11.5px; color:#8A8067; margin-bottom:6px; font-weight:700;">${t.phonologicalSwaps}</div>
          ${phonologicalSwaps.map(s=>`<div class="prof-dash-row"><span class="prof-dash-row-label">${s.expected} ${t.swapArrow} ${s.answered}</span><span class="prof-dash-row-value">${s.occurrences}×</span></div>`).join('')}
        </div>` : ''}
      ${errorTypes.length ? `
        <div>
          <div style="font-size:11.5px; color:#8A8067; margin-bottom:6px; font-weight:700;">${t.errorTypesLabel}</div>
          ${errorTypes.map(e=>`<div class="prof-dash-row"><span class="prof-dash-row-label">${t.errorTypeNames[e.error_type] || e.error_type}</span><span class="prof-dash-row-value">${e.occurrences}</span></div>`).join('')}
        </div>` : ''}
    `;
  }

  // --- Atenção sustentada: semana mais recente por jogo (query já ordena week_start desc) ---
  const focusByGame = {};
  (focusEvolution || []).forEach(f=>{ if(!focusByGame[f.game_key]) focusByGame[f.game_key] = f; });
  let focusHtml;
  if(!isPremium) focusHtml = lockedNote;
  else if(Object.keys(focusByGame).length === 0) focusHtml = noDataNote;
  else focusHtml = Object.entries(focusByGame).map(([key, f])=>`
    <div style="margin-bottom:10px;">
      <div style="font-size:11.5px; color:#8A8067; font-weight:700; margin-bottom:4px;">${gameTitle(key)}</div>
      <div class="prof-dash-row"><span class="prof-dash-row-label">${t.focusAvg}</span><span class="prof-dash-row-value">${Math.round(f.avg_duration_seconds || 0)}${t.seconds}</span></div>
      <div class="prof-dash-row"><span class="prof-dash-row-label">${t.focusMax}</span><span class="prof-dash-row-value">${Math.round(f.max_duration_seconds || 0)}${t.seconds}</span></div>
      <div class="prof-dash-row"><span class="prof-dash-row-label">${t.focusMin}</span><span class="prof-dash-row-value">${Math.round(f.min_duration_seconds || 0)}${t.seconds}</span></div>
      <div class="prof-dash-row"><span class="prof-dash-row-label">${t.focusDistractions}</span><span class="prof-dash-row-value">${(f.avg_distractions || 0).toFixed(1)}</span></div>
    </div>
  `).join('');

  // --- Tempo de resposta: mês mais recente por jogo (query já ordena month desc) ---
  const responseByGame = {};
  (responseTime || []).forEach(r=>{ if(!responseByGame[r.game_key]) responseByGame[r.game_key] = r; });
  let responseTimeHtml;
  if(!isPremium) responseTimeHtml = lockedNote;
  else if(Object.keys(responseByGame).length === 0) responseTimeHtml = noDataNote;
  else responseTimeHtml = Object.entries(responseByGame).map(([key, r])=>`
    <div class="prof-dash-row"><span class="prof-dash-row-label">${gameTitle(key)} — ${t.responseTimeAvg}</span><span class="prof-dash-row-value">${Math.round(r.avg_response_time_ms || 0)}${t.ms}</span></div>
    <div class="prof-dash-row"><span class="prof-dash-row-label">${gameTitle(key)} — ${t.responseTimeBest}</span><span class="prof-dash-row-value">${Math.round(r.best_response_time_ms || 0)}${t.ms}</span></div>
  `).join('');

  // --- Memória de trabalho ---
  let workingMemoryHtml;
  if(!isPremium) workingMemoryHtml = lockedNote;
  else if((workingMemory || []).length === 0) workingMemoryHtml = noDataNote;
  else workingMemoryHtml = workingMemory.map(w=>`
    <div class="prof-dash-row"><span class="prof-dash-row-label">${gameTitle(w.game_key)} — ${t.workingMemoryLongest}</span><span class="prof-dash-row-value">${w.longest_correct_sequence ?? '-'}</span></div>
    <div class="prof-dash-row"><span class="prof-dash-row-label">${gameTitle(w.game_key)} — ${t.workingMemoryAvg}</span><span class="prof-dash-row-value">${w.avg_correct_length ? Number(w.avg_correct_length).toFixed(1) : '-'}</span></div>
  `).join('');

  // --- Flexibilidade cognitiva: média geral (não agrupado por jogo) ---
  const ruleAdaptationList = (ruleAdaptation || []).filter(r=>r.time_to_adapt_ms != null);
  const avgAdaptMs = ruleAdaptationList.length
    ? Math.round(ruleAdaptationList.reduce((sum,r)=>sum + r.time_to_adapt_ms, 0) / ruleAdaptationList.length)
    : null;
  let cognitiveFlexHtml;
  if(!isPremium) cognitiveFlexHtml = lockedNote;
  else if(avgAdaptMs === null) cognitiveFlexHtml = noDataNote;
  else cognitiveFlexHtml = `<div style="font-size:12.5px; color:#1F2E29;">${t.cognitiveFlexBody}: <strong>${avgAdaptMs}${t.ms}</strong></div>`;

  // --- Tolerância à frustração ---
  let frustrationHtml;
  if(!isPremium) frustrationHtml = lockedNote;
  else if((frustration || []).length === 0) frustrationHtml = noDataNote;
  else frustrationHtml = frustration.map(f=>`
    <div style="margin-bottom:8px;">

async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hashPin(pin){
  const str = pin + ':' + state.authUserId;
  let hash = 2166136261;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = (hash * 16777619) >>> 0;
  }
  return hash.toString(16).padStart(8, '0');
}

  const t = L();
  const errEl = document.getElementById('parentsPinError');
  const pin = document.getElementById('parentsPinInput').value.trim();
  const confirmPin = document.getElementById('parentsPinConfirmInput').value.trim();
  if(!/^\d{4}$/.test(pin)){ errEl.textContent = t.parents.errPinLength; errEl.style.display = 'block'; return; }

    errEl.style.display = 'block';

function buildClinicalSummary(detail, lang){
  const t = lang === 'it' ? SUMMARY_STRINGS.it : SUMMARY_STRINGS.pt;
  const lines = [];

  const { profile, focusEvolution, workingMemory, impulsivityIndex,
          syllableDifficulty, phonologicalSwaps, frustration,
          adherence, readingProgress } = detail;

  const name = profile?.name || t.theChild;

  // 1. Adesão
  const totalAdh = adherence || [];
  const overallAdh = totalAdh.length > 0
    ? Math.round(totalAdh.reduce((s, a) => s + (a.taxa_adesao_pct || 0), 0) / totalAdh.length)
    : null;

  if (overallAdh !== null) {
    lines.push(overallAdh >= 80
      ? t.adherenceGood(name, overallAdh)
      : overallAdh >= 50
      ? t.adherencePartial(name, overallAdh)
      : t.adherenceLow(name, overallAdh));
  }

  // 2. Atenção sustentada — pega as 2 semanas mais recentes (do primeiro jogo com dado) e compara
  const focusByGame = {};
  (focusEvolution || []).forEach(f => {
    if (!focusByGame[f.game_key]) focusByGame[f.game_key] = [];
    focusByGame[f.game_key].push(f);
  });
  const focusGames = Object.values(focusByGame);
  if (focusGames.length > 0) {
    const latest = focusGames[0];
    if (latest.length >= 2 && latest[1].avg_duration_seconds) {
      const curr = latest[0].avg_duration_seconds;
      const prev = latest[1].avg_duration_seconds;
      const delta = Math.round(((curr - prev) / prev) * 100);
      lines.push(delta > 0
        ? t.focusImproved(Math.round(curr), delta)
        : delta < -5
        ? t.focusDeclined(Math.round(curr), Math.abs(delta))
        : t.focusStable(Math.round(curr)));
    } else if (latest.length >= 1) {
      lines.push(t.focusBaseline(Math.round(latest[0].avg_duration_seconds)));
    }
  }

  // 3. Índice de impulsividade
  if (impulsivityIndex !== null && impulsivityIndex !== undefined) {
    if (impulsivityIndex >= 80) lines.push(t.impulsivityGood(impulsivityIndex));
    else if (impulsivityIndex >= 60) lines.push(t.impulsivityModerate(impulsivityIndex));
    else lines.push(t.impulsivityHigh(impulsivityIndex));
  }

  // 4. Análise fonética — sílabas difíceis
  if (syllableDifficulty && syllableDifficulty.length > 0) {
    const hard = syllableDifficulty.slice(0, 3).map(s => `${s.syllable} (${s.accuracy_pct}%)`).join(', ');
    lines.push(t.syllablesHard(hard));
  } else if (readingProgress?.mastered_syllables?.length > 0) {
    lines.push(t.syllablesMastered(readingProgress.mastered_syllables.length));
  }

  // 5. Trocas fonológicas
  if (phonologicalSwaps && phonologicalSwaps.length > 0) {
    const topSwap = phonologicalSwaps[0];
    lines.push(t.phoneticSwap(topSwap.expected, topSwap.answered, topSwap.occurrences));
  }

  // 6. Tolerância à frustração
  const totAbandons = (frustration || []).reduce((s, f) => s + (f.abandons || 0), 0);
  const totRetries = (frustration || []).reduce((s, f) => s + (f.retries || 0), 0);
  if (totAbandons === 0 && totRetries > 0) lines.push(t.persistenceGood(name, totRetries));
  else if (totAbandons > 2) lines.push(t.persistenceLow(name, totAbandons));

  if (lines.length === 0) return t.noData(name);

  return lines.join(' ');
}
// game_sessions is shared across both apps (game_key includes the 6 Ilha do Foco
// keys plus 'aventura_das_letras'), each row carrying its own played_at/end_time —
// so summing every row's real duration here already covers both apps' screen time.
function computeWeeklyUsage(sessions){
  const minutesByDay = [0,0,0,0,0,0,0];
  const cutoff = Date.now() - 7*24*60*60*1000;
  sessions.forEach(s=>{
    if(!s.end_time) return;
    const start = new Date(s.played_at);
    if(start.getTime() < cutoff) return;
    const end = new Date(s.end_time);
    minutesByDay[start.getDay()] += Math.max(0, (end - start) / 60000);
  });
  return minutesByDay.map(m=>Math.round(m));
}
function renderWeeklyChart(container, minutesByDay, dayLabels){
  container.innerHTML = '';
  const bars = document.createElement('div');
  bars.className = 'weekly-bars';
  const max = Math.max(1, ...minutesByDay);
  minutesByDay.forEach((m,i)=>{
    const col = document.createElement('div');
    col.className = 'weekly-bar-col';
    const bar = document.createElement('div');
    bar.className = 'weekly-bar';
    bar.style.height = `${Math.max(3, (m/max)*100)}%`;
    bar.title = `${m} min`;
    const label = document.createElement('div');
    label.className = 'weekly-bar-label';
    label.textContent = dayLabels[i];
    col.appendChild(bar);
    col.appendChild(label);
    bars.appendChild(col);
  });
  container.appendChild(bars);
}

async function parentsOpenDashboard(){
  document.getElementById('parentsGate').style.display = 'none';
  document.getElementById('parentsDashboard').style.display = 'block';
  parentsChildren = await loadProfilesList();
  const tabsWrap = document.getElementById('parentsChildTabs');
  const body = document.getElementById('parentsDashboardBody');
  if(!parentsChildren.length){
    tabsWrap.innerHTML = '';
    body.innerHTML = '';
    const p = document.createElement('p');
    p.className = 'chart-empty';
    p.textContent = L().parents.noChildren;
    body.appendChild(p);
    return;
  }
  if(!parentsChildren.some(c=>c.id === parentsActiveChildId)) parentsActiveChildId = parentsChildren[0].id;
  renderParentsChildTabs();
  await renderParentsDashboardBody();
}
function renderParentsChildTabs(){
  const wrap = document.getElementById('parentsChildTabs');
  wrap.innerHTML = '';
  if(parentsChildren.length < 2) return;
  parentsChildren.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'diff-btn' + (c.id === parentsActiveChildId ? ' selected' : '');
    btn.textContent = `${c.avatar} ${c.name}`;
    btn.onclick = async ()=>{
      parentsActiveChildId = c.id;
      renderParentsChildTabs();
      await renderParentsDashboardBody();
    };
    wrap.appendChild(btn);
  });
}
async function startCheckout(btn){
  const t = L();
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = t.parents.checkoutRedirecting;
  try{
    const { data: { session } } = await sb.auth.getSession();
    if(!session) throw new Error('no-session');
    const country = navigator.language.toLowerCase().startsWith('pt') ? 'BR' : 'INT';
    const response = await fetch('https://pswmbqlafywaxphsrloe.supabase.co/functions/v1/create-checkout-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ country }),
    });
    const result = await response.json();
    if(!response.ok || !result.url) throw new Error(result.error || 'checkout_failed');
    window.location.href = result.url;
  }catch(err){
    btn.disabled = false;
    btn.textContent = originalLabel;
    showError(t.parents.checkoutError);
  }
}
async function manageSubscription(btn){
  const t = L();
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = t.parents.manageSubRedirecting;
  try{
    const { data: { session } } = await sb.auth.getSession();
    if(!session) throw new Error('no-session');
    const response = await fetch('https://pswmbqlafywaxphsrloe.supabase.co/functions/v1/create-portal-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ returnUrl: 'https://interativo-pi.vercel.app' }),
    });
    const result = await response.json();
    if(result.url){
      window.location.href = result.url;
      return;
    }
    if(result.error === 'no_stripe_customer'){
      btn.disabled = false;
      btn.textContent = originalLabel;
      alert(t.parents.manageSubNoCustomer);
      return;
    }
    throw new Error(result.error || 'portal_failed');
  }catch(err){
    btn.disabled = false;
    btn.textContent = originalLabel;
    showError(t.parents.manageSubError);
  }
}
async function renderParentsDashboardBody(){
  const t = L();
  const body = document.getElementById('parentsDashboardBody');
  body.innerHTML = '';
  const child = parentsChildren.find(c=>c.id === parentsActiveChildId);
  if(!child) return;

  try{
    const { data: { session } } = await sb.auth.getSession();
    if(!session) throw new Error('no-session');
  }catch(e){
    body.innerHTML = '';
    const err = document.createElement('div');
    err.className = 'parents-dash-error';
    err.innerHTML = `<p>${t.parents.sessionExpired}</p>`;
    body.appendChild(err);
    return;
  }

  let sessions, reading, subscription, professionals, adherence, pendingRequests;
  try{
    [sessions, reading, subscription, professionals, adherence, pendingRequests] = await Promise.all([
      loadSessions(child.id),
      loadReadingProgress(child.id),
      loadSubscription(state.familyId),
      loadLinkedProfessionals(child.id),
      loadAdherence(child.id),
      loadPendingProfessionalRequests(child.id)
    ]);
  }catch(e){
    body.innerHTML = '';
    const err = document.createElement('div');
    err.className = 'parents-dash-error';
    err.innerHTML = `<p>${t.parents.dashboardError}</p>`;
    const retryBtn = document.createElement('button');
    retryBtn.className = 'big-cta';
    retryBtn.textContent = t.parents.retryBtn;
    retryBtn.onclick = renderParentsDashboardBody;
    err.appendChild(retryBtn);
    body.appendChild(err);
    return;
  }

  const locale = state.lang === 'it' ? 'it-IT' : 'pt-BR';
  // game_sessions is shared with Aventura das Letras (game_key: 'aventura_das_letras'),
  // so the Ilha do Foco summary/grid must filter down to this app's own game keys.
  const ilhaDoFocoSessions = sessions.filter(s=>GAME_KEYS.includes(s.game_key));

  const isPremium = subscription?.plan === 'premium';
  if(isPremium){
    const topline = document.createElement('div');
    topline.className = 'parents-topline';

      <button type="button" class="parents-manage-sub-btn">${t.parents.manageSubBtn}</button>

    topline.querySelector('.parents-manage-sub-btn').addEventListener('click', (e)=> manageSubscription(e.currentTarget));

  const masteredSyllables = reading?.mastered_syllables || [];

    const tip = document.createElement('div');
    tip.className = 'parents-tip';
    tip.innerHTML = `<span class="tip-emoji">🦫</span><div><div class="tip-title">${t.parents.kapiTipTitle}</div><div class="tip-text">${t.parents.kapiTip(child.name, masteredSyllables.length)}</div></div>`;

    <div class="parents-stat"><span class="v">${ilhaDoFocoSessions.length}</span><span class="l">${t.parents.statsSessions}</span></div>
    <div class="parents-stat"><span class="v">${lastPlayed}</span><span class="l">${t.parents.statsLast}</span></div>`;
  body.appendChild(summary);

  // ---- Aventura das Letras ----
  const readingTitle = document.createElement('div');
  readingTitle.className = 'parents-section-title';
  readingTitle.innerHTML = `📚 ${t.parents.readingTitle}`;
  body.appendChild(readingTitle);
  const readingSubtitle = document.createElement('div');
  readingSubtitle.className = 'parents-section-subtitle';
  readingSubtitle.textContent = t.parents.readingSubtitle;
  body.appendChild(readingSubtitle);

  const readingCard = document.createElement('div');
  readingCard.className = 'parents-reading-card';
  if(!reading){

    }

    html += `<div class="parents-reading-row"><span>${t.parents.readingChallenges}</span><span>${reading.challenges_completed ?? 0}</span></div>`;

  body.appendChild(readingCard);

  // ---- Ilha do Foco ----

        <div class="parents-adherence-line">${t.parents.adherenceLine(gameLabel, pct, r.semanas_com_meta_atingida, r.semanas_com_dado)}</div>
        <div class="parents-adherence-phrase">${phrase}</div>

  body.appendChild(dangerCard);

function renderTrendChart(container, sessions){
  container.innerHTML = '';
  const t = L();
  if(!sessions.length){
    const p = document.createElement('p');
    p.className = 'chart-empty';
    p.textContent = t.parents.noSessions;
    container.appendChild(p);
    return;
  }
  const pts = sessions.slice(-12);
  const W = 280, H = 84, padX = 14, padY = 14;
  const stepX = pts.length > 1 ? (W - padX*2) / (pts.length - 1) : 0;
  const yFor = (stars) => H - padY - (stars/3) * (H - padY*2);
  const locale = state.lang === 'it' ? 'it-IT' : 'pt-BR';

  const tip = document.createElement('div');
  tip.className = 'chart-tip';
  container.appendChild(tip);

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('class', 'trend-chart');
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', t.parents.chartAriaLabel);

  [0,1,2,3].forEach(v=>{
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', padX); line.setAttribute('x2', W - padX);
    line.setAttribute('y1', yFor(v)); line.setAttribute('y2', yFor(v));
    line.setAttribute('class', 'trend-grid');
    svg.appendChild(line);
  });

  const linePoints = pts.map((s,i)=> `${padX + i*stepX},${yFor(s.stars)}`).join(' ');
  const polyline = document.createElementNS(svgNS, 'polyline');
  polyline.setAttribute('points', linePoints);
  polyline.setAttribute('class', 'trend-line');
  svg.appendChild(polyline);

  pts.forEach((s,i)=>{
    const cx = padX + i*stepX, cy = yFor(s.stars);
    const c = document.createElementNS(svgNS, 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', 4);
    c.setAttribute('class', 'trend-dot');
    c.setAttribute('tabindex', '0');
    const dateStr = new Date(s.played_at).toLocaleDateString(locale, { day:'2-digit', month:'2-digit' });
    const label = `${dateStr} · ${'⭐'.repeat(s.stars)}${'☆'.repeat(3-s.stars)} · ${t.diff[s.difficulty] || s.difficulty}`;
    const show = ()=>{
      tip.textContent = label;
      tip.style.left = (cx/W*100) + '%';
      tip.style.top = (cy/H*100) + '%';
      tip.style.display = 'block';
    };
    const hide = ()=>{ tip.style.display = 'none'; };
    c.addEventListener('mouseenter', show);
    c.addEventListener('mouseleave', hide);
    c.addEventListener('focus', show);
    c.addEventListener('blur', hide);
    svg.appendChild(c);
  });

  container.appendChild(svg);
}

// Lets vendas.html link straight into the signup form instead of login -
// authMode is read whenever renderAuthScreen() first runs, so setting it
// here (synchronous, top of the auth-state check) is enough.
(function openSignupFromQueryParam(){
  if(new URLSearchParams(window.location.search).get('signup') === '1'){
    authMode = 'signup';
    history.replaceState({}, '', window.location.pathname);
  }
})();

/* ========================= CHECKOUT REDIRECT ========================= */
(function handleCheckoutRedirect(){
  const params = new URLSearchParams(window.location.search);
  const checkout = params.get('checkout');
  if(!checkout) return;
  history.replaceState({}, '', window.location.pathname);
  if(checkout === 'success'){
    alert(L().checkoutSuccessMsg);
    if(document.getElementById('screen-parents')?.classList.contains('active')){
      renderParentsDashboardBody();
    }
  }
})();
