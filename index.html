<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilha do Foco — com a Kapi</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B3D2E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0B3D2E; --bg-mid:#15563F; --bg-mid2:#1C6A4C;
    --sand:#F0C878; --papaya:#F2703C; --lilac:#8FA6CD; --cream:#FFF8ED;
    --leaf:#4C9A5C; --leaf-dark:#357048; --berry:#E5556E; --success:#7CC576; --ink:#0B3D2E;
    --shadow: 0 10px 30px rgba(0,0,0,.25); --radius-lg: 28px; --radius-md: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, var(--bg-mid2), transparent 60%),
      radial-gradient(1000px 500px at 100% 10%, var(--bg-mid), transparent 55%),
      var(--bg-deep);
    color:var(--cream); min-height:100vh; overflow-x:hidden; position:relative;
  }
  h1,h2,h3,.display{font-family:'Baloo 2',cursive;}
  button{font-family:inherit;}

  .ambient-leaf{ position:fixed; font-size:28px; opacity:.18; pointer-events:none; animation: drift 14s linear infinite; }
  @keyframes drift{ 0%{ transform: translateY(110vh) rotate(0deg);} 100%{ transform: translateY(-10vh) rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){ .ambient-leaf{ display:none; } *{ animation-duration: .001ms !important; } }

  .app{ max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; position:relative; z-index:1; }

  .hub-header{ display:flex; align-items:center; gap:14px; justify-content:space-between; margin-bottom: 22px; flex-wrap: wrap; }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand h1{ font-size: 28px; margin:0; letter-spacing:.3px; color:var(--sand); }
  .brand p{ margin:2px 0 0; font-size:13px; color:var(--lilac); font-weight:700;}
  .top-actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .seeds{ display:flex; align-items:center; gap:8px; background: rgba(255,255,255,.08); border:2px solid rgba(240,200,120,.35); padding:8px 16px; border-radius: 999px; font-weight:800; font-size:15px; color:var(--sand); }
  .icon-btn{ background: rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); color:var(--cream); padding:8px 14px; border-radius:999px; cursor:pointer; font-weight:800; font-size:13.5px; }
  .icon-btn:hover{ background: rgba(255,255,255,.2); }
  .profile-chip{ display:flex; align-items:center; gap:8px; background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); padding:6px 14px 6px 8px; border-radius: 999px; font-weight:800; font-size:14px; }
  .profile-chip .av{ font-size:20px; }
  .lang-toggle{ display:flex; gap:4px; background: rgba(255,255,255,.08); border-radius:999px; padding:4px; border:2px solid rgba(255,255,255,.15); }
  .lang-toggle button{ background:transparent; border:none; font-size:18px; padding:4px 8px; border-radius:999px; cursor:pointer; opacity:.5; }
  .lang-toggle button.active{ opacity:1; background: rgba(255,255,255,.18); }

  .mascot-wrap{ display:flex; flex-direction:column; align-items:center; margin: 6px 0 26px; }
  .mascot-float{ animation: float 4s ease-in-out infinite; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .speech{ background: var(--cream); color:var(--ink); font-weight:800; padding:10px 18px; border-radius: 18px; margin-top:8px; box-shadow: var(--shadow); font-size:15px; max-width: 380px; text-align:center; position:relative; display:flex; align-items:center; gap:8px; }
  .speech:after{ content:""; position:absolute; top:-8px; left:50%; transform:translateX(-50%); border-width:0 8px 8px 8px; border-style:solid; border-color: transparent transparent var(--cream) transparent; }
  .speech-text{ flex:1; }

  .tts-btn{ background: rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.3); color:var(--cream); width:32px; height:32px; min-width:32px; border-radius:50%; cursor:pointer; font-size:15px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; padding:0; line-height:1; transition: transform .1s, background .1s; }
  .tts-btn:hover{ background: rgba(255,255,255,.28); transform: scale(1.08); }
  .tts-btn:active{ transform: scale(.95); }
  .tts-btn-light{ background: rgba(11,61,46,.08); border:2px solid rgba(11,61,46,.18); color:var(--ink); }
  .tts-btn-light:hover{ background: rgba(11,61,46,.16); }
  .tts-icon{ position:absolute; font-size:15px; cursor:pointer; opacity:.7; line-height:1; }
  .tts-icon:hover{ opacity:1; }

  .grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:18px; }
  .tile{ background: linear-gradient(160deg, rgba(255,255,255,.08), rgba(255,255,255,.02)); border: 2px solid rgba(255,255,255,.12); border-radius: var(--radius-lg); padding: 20px 18px; cursor:pointer; position:relative; text-align:left; transition: transform .15s ease, border-color .15s ease, background .15s ease; display:flex; flex-direction:column; gap:8px; }
  .tile:hover, .tile:focus-visible{ transform: translateY(-4px); border-color: var(--sand); background: linear-gradient(160deg, rgba(255,255,255,.14), rgba(255,255,255,.04)); outline: none; }
  .tile .emoji{ font-size:36px; }
  .tile h3{ margin:0; font-size:19px; color:var(--cream); }
  .tile .skill{ font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color: var(--bg-deep); background: var(--sand); display:inline-block; padding:3px 10px; border-radius:999px; width:fit-content; }
  .tile p{ margin:0; font-size:13.5px; color:var(--lilac); font-weight:600; line-height:1.4;}
  .tile .stars-earned{ margin-top:4px; font-size:14px; }

  .screen{ display:none; } .screen.active{ display:block; }
  .game-shell{ background: rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12); border-radius: var(--radius-lg); padding: 24px; min-height: 420px; position:relative; }
  .top-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:10px; flex-wrap:wrap;}
  .back-btn{ background: rgba(255,255,255,.1); color:var(--cream); border:2px solid rgba(255,255,255,.2); padding:8px 16px; border-radius:999px; font-weight:800; cursor:pointer; font-size:14px; }
  .back-btn:hover{ background: rgba(255,255,255,.2); }
  .game-title{ font-size:22px; margin:0; color:var(--sand); }
  .game-instructions{ background: rgba(255,255,255,.08); border-left:4px solid var(--papaya); padding:12px 16px; border-radius:12px; font-size:14.5px; font-weight:700; margin-bottom:18px; color:var(--cream); display:flex; align-items:center; gap:12px; }
  .game-instructions .instr-text{ flex:1; }
  .feedback-banner{ text-align:center; font-weight:800; font-size:17px; padding:14px; border-radius:16px; margin: 14px 0; display:none; }
  .feedback-banner .tts-btn{ margin-left:8px; vertical-align:middle; }
  .feedback-banner.show{ display:block; }
  .feedback-banner.good{ background: rgba(124,197,118,.2); color:#B8E8B0; border:2px solid var(--success); }
  .feedback-banner.gentle{ background: rgba(255,255,255,.08); color: var(--sand); border:2px solid rgba(240,200,120,.4); }

  .big-cta{ background: var(--papaya); color:white; border:none; font-weight:800; font-size:16px; padding:14px 26px; border-radius:999px; cursor:pointer; box-shadow: var(--shadow); transition: transform .1s ease; }
  .big-cta:hover{ transform: scale(1.03); } .big-cta:active{ transform: scale(.98); }
  .big-cta.secondary{ background: transparent; border:2px solid var(--sand); color:var(--sand); }
  .center-col{ display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center; }

  .diff-row{ display:flex; gap:10px; margin-bottom:6px; flex-wrap:wrap; justify-content:center; }
  .diff-btn{ padding:10px 20px; border-radius:999px; border:2px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06); color:var(--cream); cursor:pointer; font-weight:800; font-size:14px; }
  .diff-btn.selected{ border-color: var(--papaya); background: rgba(242,112,60,.28); }
  .pre-start{ display:flex; flex-direction:column; align-items:center; gap:14px; padding: 10px 0 4px; }

  .light-circle{ width:160px; height:160px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:42px; font-weight:800; color:white; box-shadow: var(--shadow); transition: background .25s ease; cursor:pointer; user-select:none; border: 6px solid rgba(255,255,255,.2); }
  .light-circle.wait{ background: radial-gradient(circle at 35% 30%, #ff8b8b, var(--berry)); }
  .light-circle.go{ background: radial-gradient(circle at 35% 30%, #a8e79f, var(--success)); }
  .rounds-track{ display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; justify-content:center; }
  .round-dot{ width:14px; height:14px; border-radius:50%; background: rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.3);}
  .round-dot.hit{ background: var(--success); border-color:var(--success); }
  .round-dot.miss{ background: var(--berry); border-color:var(--berry); }

  .trail-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:20px; width: min(360px,85vw); }
  .trail-pad{ aspect-ratio:1; min-height:120px; border-radius:26px; border:none; cursor:pointer; opacity:.6; transition: opacity .15s ease, transform .1s ease; box-shadow: var(--shadow); display:flex; align-items:center; justify-content:center; font-size:46px; touch-action:manipulation; -webkit-tap-highlight-color:transparent; user-select:none; }
  .trail-pad.lit{ opacity:1; transform: scale(1.08); }
  .trail-pad.locked{ pointer-events:none; }
  .trail-pad:active{ transform: scale(.94); }
  .trail-pad:nth-child(1){ background:#F2703C; } .trail-pad:nth-child(2){ background:#8FA6CD; }
  .trail-pad:nth-child(3){ background:#F0C878; } .trail-pad:nth-child(4){ background:#7CC576; }
  .trail-footprints{ display:flex; gap:8px; min-height:18px; }
  .trail-footprints span{ opacity:.25; font-size:16px; transition: opacity .15s ease; }
  .trail-footprints span.done{ opacity:1; }
  .level-badge{ font-weight:800; color:var(--sand); font-size:15px; }

  .story-cards{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .story-card{ width:110px; height:110px; background: var(--cream); color:var(--ink); border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:38px; cursor:pointer; position:relative; box-shadow: var(--shadow); border:3px solid transparent; transition: transform .1s; }
  .story-card:hover{ transform: translateY(-3px); }
  .answer-row{ display:flex; gap:14px; justify-content:center; margin-top:22px; flex-wrap:wrap; min-height:110px; }
  .answer-slot{ width:110px; height:110px; border-radius:18px; border:3px dashed rgba(255,255,255,.3); display:flex; align-items:center; justify-content:center; font-size:34px; color: rgba(255,255,255,.4); }
  .answer-slot.filled{ border-style:solid; background:var(--cream); color:var(--ink); }

  .chat-bubble{ background: var(--cream); color:var(--ink); border-radius:20px 20px 20px 4px; padding:16px 20px; font-weight:700; font-size:16px; max-width:480px; box-shadow: var(--shadow); text-align:left; display:flex; align-items:center; gap:10px; }
  .chat-bubble .speech-text{ flex:1; }
  .reply-options{ display:flex; flex-direction:column; gap:10px; width:min(480px,90vw); }
  .reply-btn{ background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2); color:var(--cream); padding:13px 18px; padding-right:42px; border-radius:16px; text-align:left; cursor:pointer; font-weight:700; font-size:14.5px; position:relative; }
  .reply-btn:hover{ border-color: var(--sand); background: rgba(255,255,255,.14); }
  .reply-hint{ display:block; font-weight:600; font-size:12px; opacity:.65; margin-top:3px; }
  .reply-btn .tts-icon{ top:50%; right:12px; transform:translateY(-50%); }
  .turn-indicator{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; color: var(--lilac); }
  .turn-dot{ width:10px; height:10px; border-radius:50%; background: var(--lilac); animation: pulse 1.2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:.4} 50%{opacity:1} }

  .hunt-header{ display:flex; justify-content:space-between; width:100%; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:10px;}
  .hunt-grid{ display:grid; gap:8px; width:min(460px,90vw); }
  .hunt-cell{ aspect-ratio:1; background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.12); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; transition: transform .08s; }
  .hunt-cell:hover{ transform: scale(1.06); }
  .hunt-cell.found{ background: rgba(124,197,118,.25); border-color: var(--success); cursor:default; }
  .timer-bar-wrap{ width:min(460px,90vw); height:12px; background: rgba(255,255,255,.12); border-radius:999px; overflow:hidden; }
  .timer-bar{ height:100%; background: var(--papaya); width:100%; transition: width 1s linear; }

  .scenario-box{ background: rgba(255,255,255,.08); border-radius:18px; padding:18px 22px; font-size:16px; font-weight:700; max-width:520px; text-align:center; display:flex; align-items:center; gap:10px; }
  .scenario-box .instr-text{ flex:1; }
  .emo-options, .calm-options{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .emo-btn{ background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2); border-radius:16px; padding:14px 12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--cream); font-size:12.5px; font-weight:800; width:92px; position:relative; }
  .emo-btn .e{ font-size:30px; }
  .emo-btn:hover, .emo-btn.selected{ border-color: var(--sand); background: rgba(255,255,255,.16); }
  .emo-btn .tts-icon{ top:6px; right:8px; font-size:13px; }
  .breathe-circle{ width:90px; height:90px; border-radius:50%; background: radial-gradient(circle at 35% 30%, #a8e79f, var(--success)); margin: 10px auto; animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ transform:scale(.8);} 50%{ transform:scale(1.15);} }
  .thermo-progress{ font-size:12.5px; font-weight:800; color:var(--lilac); }

  /* ---------- PROFILES SCREEN ---------- */
  .profile-intro{ text-align:center; margin-bottom:22px; }
  .profile-intro h2{ font-size:26px; color:var(--sand); margin:0 0 6px; }
  .profile-intro p{ margin:0; color:var(--lilac); font-weight:700; font-size:14px; }
  .profile-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:16px; margin-bottom: 10px;}
  .profile-card{ background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); border-radius:20px; padding:18px 12px; text-align:center; cursor:pointer; transition:transform .15s, border-color .15s; position:relative; }
  .profile-card:hover{ transform:translateY(-4px); border-color:var(--sand); }
  .profile-card .avatar{ font-size:42px; }
  .profile-card .pname{ font-weight:800; margin-top:6px; font-family:'Baloo 2'; font-size:15.5px; }
  .profile-card .plang{ font-size:11.5px; color:var(--lilac); font-weight:700; margin-top:2px; }
  .profile-card .del-x{ position:absolute; top:6px; right:8px; background:none; border:none; color: rgba(255,255,255,.4); font-size:16px; cursor:pointer; font-weight:800;}
  .profile-card .del-x:hover{ color: var(--berry); }
  .profile-card.add-new{ border-style:dashed; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; min-height:106px; }
  .profile-form{ background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); border-radius:20px; padding:22px; margin-top:20px; max-width:440px; }
  .profile-form label{ display:block; font-weight:800; font-size:13.5px; color:var(--sand); margin-bottom:6px; }
  .profile-form input[type=text]{ width:100%; padding:12px 14px; border-radius:12px; border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:var(--cream); font-size:15px; font-weight:700; margin-bottom:16px; }
  .profile-form input[type=text]::placeholder{ color: rgba(255,255,255,.4); }
  .avatar-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .avatar-choice{ font-size:26px; background:rgba(255,255,255,.06); border:2px solid transparent; border-radius:12px; padding:6px 10px; cursor:pointer; }
  .avatar-choice.selected{ border-color:var(--sand); background:rgba(255,255,255,.16); }
  .lang-row{ display:flex; gap:10px; margin-bottom:18px; }
  .lang-choice{ flex:1; padding:12px; border-radius:12px; border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06); color:var(--cream); cursor:pointer; font-weight:800; text-align:center; font-size:14px; }
  .lang-choice.selected{ border-color:var(--sand); background:rgba(255,255,255,.18); }

  footer{ text-align:center; margin-top: 34px; font-size:12.5px; color: rgba(255,255,255,.35); font-weight:700; }

  /* ---------- AUTH SCREEN ---------- */
  .auth-box { background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.15); border-radius: var(--radius-lg); padding: 32px; max-width: 400px; margin: 40px auto; text-align: center; }
  .auth-box h2 { color: var(--sand); font-size: 24px; margin-top: 0; margin-bottom: 8px; }
  .auth-box p { color: var(--cream); opacity: 0.8; font-size: 14.5px; margin-bottom: 24px; }
  .auth-form { display: flex; flex-direction: column; gap: 16px; text-align: left; }
  .auth-form label { font-weight: 800; font-size: 13.5px; color: var(--sand); margin-bottom: -10px; }
  .auth-form input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 2px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: var(--cream); font-size: 15px; font-weight: 700; }
  .auth-form input::placeholder { color: rgba(255,255,255,.4); }
  .auth-error { background: rgba(229,85,110,.2); color: #FFA3B1; border: 1px solid var(--berry); padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; text-align: center; display: none; }
  .auth-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .auth-toggle { background: transparent; border: none; color: var(--sand); font-weight: 700; font-size: 13.5px; cursor: pointer; text-decoration: underline; opacity: 0.8; }
  .auth-toggle:hover { opacity: 1; }
  .logout-btn { background: rgba(255,255,255,.1); border: 2px solid rgba(255,255,255,.2); color: var(--cream); padding: 8px 16px; border-radius: 999px; font-weight: 800; font-size: 13px; cursor: pointer; display: block; margin: 0 auto 20px auto; }
  .logout-btn:hover { background: rgba(255,255,255,.2); border-color: var(--sand); }
  .global-error { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--berry); color: white; padding: 12px 24px; border-radius: 999px; font-weight: 800; box-shadow: var(--shadow); z-index: 9999; display: none; }

  /* ---------- PARENTS AREA ---------- */
  .parents-gate{ max-width:360px; margin:10px auto; text-align:center; }
  .parents-gate h3{ color:var(--sand); font-size:20px; margin:0 0 6px; }
  .parents-gate p{ color:var(--cream); opacity:.85; font-size:14px; margin:0 0 18px; }
  .parents-gate label{ display:block; font-weight:800; font-size:13.5px; color:var(--sand); margin-bottom:6px; text-align:left; }
  .pin-input{ width:100%; padding:12px 14px; border-radius:12px; border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:var(--cream); font-size:20px; font-weight:800; letter-spacing:10px; text-align:center; margin-bottom:16px; }
  .parents-gate .big-cta{ width:100%; margin-top:4px; }
  .parents-gate .auth-toggle{ margin-top:14px; }
  #parentsSetupBlock .auth-error, #parentsEnterBlock .auth-error{ margin-bottom:14px; }

  .parents-summary{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:22px; }
  .parents-stat{ background: rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.12); border-radius:16px; padding:12px 20px; text-align:center; min-width:120px; }
  .parents-stat .v{ display:block; font-size:20px; font-weight:800; color:var(--sand); }
  .parents-stat .l{ display:block; font-size:12px; font-weight:700; color:var(--lilac); margin-top:2px; }

  .parents-grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:16px; }
  .parents-card{ background: rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12); border-radius:18px; padding:16px; }
  .parents-card-head{ display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .parents-card-head .emoji{ font-size:22px; }
  .parents-card-head .title{ font-weight:800; color:var(--cream); font-size:14.5px; flex:1; }
  .parents-card-head .diff-tag{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--bg-deep); background:var(--sand); padding:3px 10px; border-radius:999px; }

  .trend-chart-wrap{ position:relative; width:100%; aspect-ratio: 280 / 84; }
  .trend-chart{ width:100%; height:100%; display:block; overflow:visible; }
  .trend-grid{ stroke: rgba(255,255,255,.14); stroke-width:1; }
  .trend-line{ fill:none; stroke:var(--papaya); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .trend-dot{ fill:var(--papaya); stroke:var(--bg-deep); stroke-width:2; cursor:pointer; }
  .trend-dot:hover, .trend-dot:focus{ fill:var(--sand); outline:none; }
  .chart-tip{ position:absolute; transform:translate(-50%,-135%); background:var(--cream); color:var(--ink); font-size:11px; font-weight:800; padding:5px 9px; border-radius:8px; white-space:nowrap; box-shadow:var(--shadow); pointer-events:none; display:none; z-index:5; }
  .chart-empty{ color: var(--lilac); font-size:13px; font-weight:700; text-align:center; padding:14px 0; }
  .parents-recent{ list-style:none; margin:10px 0 0; padding:0; font-size:12px; color: var(--cream); opacity:.85; display:flex; flex-direction:column; gap:3px; }

  /* ---------- STICKER ALBUM ---------- */
  .album-summary{ text-align:center; font-weight:800; color:var(--sand); margin-bottom:16px; font-size:15px; }
  .album-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(108px,1fr)); gap:14px; }
  .sticker-card{ aspect-ratio:1; border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:10px; text-align:center; border:3px solid; transition: transform .12s ease; }
  .sticker-card.unlocked{ background: var(--cream); }
  .sticker-card.locked{ background: rgba(255,255,255,.06); cursor:pointer; }
  .sticker-card.locked:hover{ transform: translateY(-3px); }
  .sticker-card .sticker-emoji{ font-size:36px; }
  .sticker-card .sticker-emoji.locked-emoji{ filter: grayscale(1) brightness(.55); opacity:.6; }
  .sticker-card .sticker-name{ font-weight:800; font-size:12px; color:var(--ink); }
  .sticker-card .sticker-price{ font-weight:800; font-size:12.5px; color:var(--sand); }
  .sticker-card.tier-bronze{ border-color:#BE8C5D; }
  .sticker-card.tier-silver{ border-color:#C7CDD6; }
  .sticker-card.tier-gold{ border-color:var(--sand); }
  .sticker-card.tier-legendary{ border-color:var(--papaya); box-shadow: 0 0 16px rgba(242,112,60,.5); }

function getAuthErrorMsg(errCode) {
  const t = AUTH_I18N[state.lang] || AUTH_I18N.pt;
  if (!errCode) return t.errorGeneric;

}

async function handleAuthSubmit() {
  const t = AUTH_I18N[state.lang] || AUTH_I18N.pt;
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const confirmPassword = document.getElementById('authConfirmPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';
  
  if(!email || (authMode !== 'reset' && !password)) {
    errEl.textContent = t.errorInvalidCredentials;
    errEl.style.display = 'block';
    return;
  }
  
  if (authMode === 'signup' && password !== confirmPassword) {
    errEl.textContent = t.errorPasswordMismatch;
    errEl.style.display = 'block';
    return;
  }
  
  const btn = document.getElementById('authSubmitBtn');
  const originalText = btn.textContent;
  btn.textContent = authMode === 'signup' ? t.loadingSignup : (authMode === 'login' ? t.loadingLogin : '...');
  btn.disabled = true;
  
  let error = null;
  if (authMode === 'signup') {
    const res = await sb.auth.signUp({ email, password });
    error = res.error;
  } else if (authMode === 'login') {
    const res = await sb.auth.signInWithPassword({ email, password });
    error = res.error;
  } else if (authMode === 'reset') {
    const res = await sb.auth.resetPasswordForEmail(email);
    error = res.error;
    if(!error) {
      errEl.style.color = '#B8E8B0';
      errEl.style.backgroundColor = 'rgba(124,197,118,.2)';
      errEl.style.borderColor = 'var(--success)';
      errEl.textContent = t.resetSentMessage;
      errEl.style.display = 'block';
      btn.textContent = originalText;
      btn.disabled = false;
      return;
    }
  }
  
  if (error) {
    errEl.style.color = '#FFA3B1';
    errEl.style.backgroundColor = 'rgba(229,85,110,.2)';
    errEl.style.borderColor = 'var(--berry)';
    errEl.textContent = getAuthErrorMsg(error.message || error.code);
    errEl.style.display = 'block';
  }
  
  btn.textContent = originalText;
  btn.disabled = false;
}

async function handleLogout() {
  const t = AUTH_I18N[state.lang] || AUTH_I18N.pt;
  if(!confirm(t.logoutConfirm)) return;
  flushSessionLog(); // persist whatever round is in progress while the session is still valid
  clearTimeout(window._semTimer); clearTimeout(window._semTimer2);

  state.profileId = null;

}

function speak(text){
  if(!('speechSynthesis' in window) || !text) return;
  const clean = String(text)
    .replace(/<[^>]+>/g, ' ')
    .replace(/\p{Extended_Pictographic}/gu, '') // skip emoji (stars, hearts, etc.) so the voice doesn't try to describe them
    .replace(/\s+/g,' ').trim();
  if(!clean) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = state.lang === 'it' ? 'it-IT' : 'pt-BR';
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

/* ========================= GAME 1: SEMÁFORO ========================= */
let sem = { round:0, hits:0, total:5, canGo:false, cfg:null };
function semInit(){
  const t = L();
  document.getElementById('semTitle').textContent = t.sem.title;
  setInstructions('semInstructions', t.sem.instr);
  document.getElementById('semStartBtn').textContent = t.startBtn;
  document.getElementById('semPreStart').style.display = 'flex';
  document.getElementById('semPlayArea').style.display = 'none';
  hideFeedback('semFeedback');
  renderDiffRow('semDiffRow', 'semaforo');
}
function semStart(){
  const t = L();
  sem.cfg = DIFF.semaforo[getDifficulty('semaforo')];
  sem.round = 0; sem.hits = 0; sem.total = sem.cfg.rounds; sem.canGo = false;
  document.getElementById('semPreStart').style.display = 'none';
  document.getElementById('semPlayArea').style.display = 'flex';
  document.getElementById('semRounds').innerHTML = Array.from({length:sem.total}).map(()=>'<div class="round-dot"></div>').join('');
  semNextRound();
}
function semNextRound(){
  clearTimeout(window._semTimer);
  const t = L();
  const light = document.getElementById('semLight');
  if(sem.round >= sem.total){ semEnd(); return; }
  light.className = 'light-circle wait'; light.textContent = t.sem.wait; sem.canGo = false;
  const waitTime = sem.cfg.waitMin + Math.random()*(sem.cfg.waitMax - sem.cfg.waitMin);
  window._semTimer = setTimeout(()=>{
    light.className = 'light-circle go'; light.textContent = t.sem.go; sem.canGo = true;
    window.instructionEndedAt = Date.now();
    window._semTimer = setTimeout(()=>{ 
      if(sem.canGo){ 
        sem.canGo = false; 
        logGameEvent({ eventType: 'answer', targetType: 'light', correct: false, errorType: 'omission' });
        markRound(false); 
      } 
    }, sem.cfg.greenMs);
  }, waitTime);
}
function semTap(){
  if(sem.round >= sem.total) return;
  if(sem.canGo){ 
    const rt = Date.now() - window.instructionEndedAt;
    sem.canGo = false; 
    logGameEvent({ eventType: 'answer', targetType: 'light', correct: true, responseTimeMs: rt });
    markRound(true); 
  }
  else { 
    logGameEvent({ eventType: 'premature_click', targetType: 'light' });
    showFeedback('semFeedback', L().sem.early, false); setTimeout(()=>hideFeedback('semFeedback'), 1100); 
  }
}
function markRound(hit){
  clearTimeout(window._semTimer);
  const t = L();
  const dots = document.querySelectorAll('#semRounds .round-dot');
  dots[sem.round].classList.add(hit?'hit':'miss');
  if(hit){ sem.hits++; showFeedback('semFeedback', t.sem.hit, true); } else { showFeedback('semFeedback', t.sem.miss, false); }
  sem.round++;
  setTimeout(()=>{ hideFeedback('semFeedback'); semNextRound(); }, 900);
}
function semEnd(){
  sessionCompleted = true;
  logGameEvent({ eventType: 'activity_complete' });
  const t = L();
  const light = document.getElementById('semLight');
  light.className = 'light-circle go'; light.textContent = '🎉';
  const ratio = sem.hits / sem.total;
  const stars = ratio>=0.9?3: ratio>=0.5?2: ratio>0?1:0;
  setStars('semaforo', stars);
  addSeeds(sem.hits*2);
  showFeedback('semFeedback', `${t.sem.result(sem.hits, sem.total)} ${'⭐'.repeat(stars)}`, true);
  say(stars>=2 ? t.mascotGood : t.mascotTry);
}

  simon.sequence = Array.from({length: simon.cfg.startLen}, ()=>Math.floor(Math.random()*4));
  simon.level = 1;
  simonPlaySequence();
}
function simonSetLocked(locked){
  document.querySelectorAll('.trail-pad').forEach(p=>p.classList.toggle('locked', locked));
}
function simonRenderFootprints(litCount){
  const el = document.getElementById('trailFootprints');
  el.innerHTML = '';
  for(let i=0;i<simon.sequence.length;i++){
    const span = document.createElement('span');
    span.textContent = '👣';
    if(i < litCount) span.classList.add('done');
    el.appendChild(span);
  }
}
function simonPlaySequence(){
  const t = L();
  simon.playing = true; simon.input = []; simon.locked = false;
  document.getElementById('simonLevel').textContent = t.mem.level(simon.level);
  hideFeedback('simonFeedback');
  simonRenderFootprints(0);
  simonSetLocked(true);
  let i = 0;
  const pads = document.querySelectorAll('.trail-pad');
  function step(){
    if(i>0) pads[simon.sequence[i-1]].classList.remove('lit');
    if(i >= simon.sequence.length){ 
      simon.playing = false; 
      simonSetLocked(false); 
      window.instructionEndedAt = Date.now();
      return; 
    }
    pads[simon.sequence[i]].classList.add('lit');
    i++;
    setTimeout(step, simon.cfg.stepDelay);
  }
  setTimeout(step, 500);
}
function simonInput(padIndex){
  if(simon.playing || simon.locked) {
    if (simon.playing) logGameEvent({ eventType: 'premature_click' });
    return;
  }
  if(simon.input.length >= simon.sequence.length) return;
  const rt = Date.now() - (window.instructionEndedAt || Date.now());
  window.instructionEndedAt = Date.now(); // reset timer for next input in sequence
  simon.locked = true;
  setTimeout(()=>{ simon.locked = false; }, 280);
  const t = L();
  const pads = document.querySelectorAll('.trail-pad');
  pads[padIndex].classList.add('lit');
  setTimeout(()=>pads[padIndex].classList.remove('lit'), 250);
  simon.input.push(padIndex);
  const idx = simon.input.length - 1;
  const isCorrect = simon.input[idx] === simon.sequence[idx];
  let errorType = null;
  if (!isCorrect && rt < 400) errorType = 'impulsiva';
  logGameEvent({ eventType: 'answer', targetType: 'sequence', target: simon.sequence.join(''), responseValue: simon.input.join(''), correct: isCorrect, responseTimeMs: rt, errorType });

  if(!isCorrect){
    simon.playing = true;
    showFeedback('simonFeedback', t.mem.wrong, false);
    const stars = simon.level-1 >= Math.ceil(simon.cfg.maxLevel*0.7) ? 3 : simon.level-1 >= Math.ceil(simon.cfg.maxLevel*0.4) ? 2 : simon.level-1>=1?1:0;
    setStars('memoria', stars);
    setTimeout(()=>simonPlaySequence(), 1400);
    return;
  }
  simonRenderFootprints(simon.input.length);
  if(simon.input.length === simon.sequence.length){
    simon.playing = true;
    if(simon.level >= simon.cfg.maxLevel){
      sessionCompleted = true;
      logGameEvent({ eventType: 'activity_complete' });
      showFeedback('simonFeedback', t.mem.mastery, true);
      setStars('memoria', 3); addSeeds(10); say(t.mascotGood);
      return;
    }
    showFeedback('simonFeedback', t.mem.next, true);
    addSeeds(2);
    simon.level++;
    simon.sequence.push(Math.floor(Math.random()*4));
    setTimeout(()=>simonPlaySequence(), 1200);
  }
}
document.getElementById('simonGrid').addEventListener('pointerdown', function(e){
  if(!e.isPrimary) return; // ignore incidental secondary touches (palm/other finger) so they can't hijack the sequence
  const pad = e.target.closest('.trail-pad');
  if(!pad) return;
  e.preventDefault();
  simonInput(Number(pad.dataset.i));
});

let story = { correct:[], shuffled:[], answer:[], title:'', lastPickIdx:null, lastWasPerfect:true };
function storyInit(){

}
function storyStart(){
  const t = L();
  const cfg = DIFF.historia[getDifficulty('historia')];
  const bank = STORY_BANK[state.lang];
  let idx;
  if(!story.lastWasPerfect && story.lastPickIdx !== null && bank[story.lastPickIdx]){
    idx = story.lastPickIdx; // retry the same story after a wrong/partial attempt
  } else {
    do { idx = Math.floor(Math.random()*bank.length); } while(bank.length > 1 && idx === story.lastPickIdx);
  }
  story.lastPickIdx = idx;
  const pick = bank[idx];
  story.title = pick.title;
  story.correct = pick.cards.slice(0, cfg.len);
  story.answer = [];
  story.shuffled = [...story.correct].sort(()=>Math.random()-0.5);
  setInstructions('storyInstructions', t.story.instr(pick.title));
  document.getElementById('storyPreStart').style.display = 'none';
  document.getElementById('storyPlayArea').style.display = 'flex';
  document.getElementById('storyResetBtn').style.display = 'none';
  hideFeedback('storyFeedback');
  renderStoryCards(); renderStoryAnswer();
  window.instructionEndedAt = Date.now();
}
function renderStoryCards(){
  const wrap = document.getElementById('storyCards');
  wrap.innerHTML = '';
  story.shuffled.forEach(emoji=>{
    const used = story.answer.includes(emoji);
    const card = document.createElement('div');
    card.className = 'story-card';
    card.textContent = emoji;
    card.style.opacity = used ? '0.35' : '1';
    card.style.pointerEvents = used ? 'none' : 'auto';
    card.onclick = ()=>storyPick(emoji);
    wrap.appendChild(card);
  });
}
function renderStoryAnswer(){
  const wrap = document.getElementById('storyAnswer');
  wrap.innerHTML = '';
  for(let i=0;i<story.correct.length;i++){
    const slot = document.createElement('div');
    const filled = story.answer[i] !== undefined;
    slot.className = 'answer-slot' + (filled?' filled':'');
    slot.textContent = filled ? story.answer[i] : (i+1);
    wrap.appendChild(slot);
  }
}
function storyPick(emoji){
  if(story.answer.length >= story.correct.length) return;
  const rt = Date.now() - (window.instructionEndedAt || Date.now());
  window.instructionEndedAt = Date.now();
  story.answer.push(emoji);
  const isCorrect = emoji === story.correct[story.answer.length - 1];
  logGameEvent({ eventType: 'answer', targetType: 'instruction', target: story.title, responseValue: emoji, correct: isCorrect, responseTimeMs: rt });
  renderStoryCards(); renderStoryAnswer();
  if(story.answer.length === story.correct.length) checkStory();
}
function checkStory(){
  const t = L();
  let correctCount = 0;
  for(let i=0;i<story.correct.length;i++) if(story.answer[i] === story.correct[i]) correctCount++;
  const ratio = correctCount/story.correct.length;
  const stars = ratio===1?3: ratio>=0.6?2: ratio>0?1:0;
  setStars('historia', stars);
  sessionCompleted = true;
  logGameEvent({ eventType: 'activity_complete' });
  story.lastWasPerfect = correctCount === story.correct.length;
  if(story.lastWasPerfect){
    showFeedback('storyFeedback', t.story.perfect, true); addSeeds(6); say(t.mascotGood);
  } else {
    showFeedback('storyFeedback', t.story.partial(correctCount, story.correct.length), false); say(t.mascotTry);
  }
  document.getElementById('storyResetBtn').style.display = 'inline-block';
}

function renderChatStep(){
  document.getElementById('turnIndicator').style.display = 'none';
  document.getElementById('chatContinueBtn').style.display = 'none';
  if(chat.step >= chat.turns.length){ chatEnd(); return; }
  const s = chat.turns[chat.step];
  setChatBubble(s.line);
  const optWrap = document.getElementById('replyOptions');
  optWrap.innerHTML = '';
  const shuffled = [...s.options].sort(()=>Math.random()-0.5);

  const t = L();
  document.querySelectorAll('.reply-btn').forEach(b=>b.style.pointerEvents='none');
  const rt = Date.now() - (window.instructionEndedAt || Date.now());
  logGameEvent({ eventType: 'answer', targetType: 'dialog', responseValue: opt.text, correct: opt.ok, responseTimeMs: rt });
  if(opt.ok){
    if(!chat.triedThisTurn) chat.firstTryCorrect++;
    showFeedback('chatFeedback', t.chat.correct, true);
    chat.willAdvance = true;
  } else {
    chat.triedThisTurn = true;
    showFeedback('chatFeedback', t.chat.wrong, false);
    chat.willAdvance = false;
  }
  document.getElementById('turnIndicator').style.display = 'flex';
  document.getElementById('chatContinueBtn').style.display = 'inline-block';

function chatContinue(){
  document.getElementById('chatContinueBtn').style.display = 'none';
  hideFeedback('chatFeedback');
  if(chat.willAdvance){
    chat.step++;
    chat.triedThisTurn = false;
  }
  renderChatStep(); // same turn repeats if the last answer was wrong, otherwise moves on
}
function chatEnd(){
  sessionCompleted = true;
  logGameEvent({ eventType: 'activity_complete' });
  const t = L();
  setChatBubble(t.chat.closing);
  document.getElementById('replyOptions').innerHTML = '';
  document.getElementById('turnIndicator').style.display = 'none';
  const ratio = chat.firstTryCorrect/chat.turns.length;
  const stars = ratio===1?3: ratio>=0.5?2: ratio>0?1:0;
  setStars('minhavez', stars); addSeeds(chat.firstTryCorrect*3);
  showFeedback('chatFeedback', t.chat.result(chat.firstTryCorrect, chat.turns.length), true);
  say(stars>=2 ? t.mascotGood : t.mascotTry);
}

/* ========================= SESSION LOGGING (for parents area) ========================= */
let currentGameKey = null;
let sessionDirty = {};
let sessionSeedsStart = {};
let currentSessionId = null;
let sessionCompleted = false;

async function logGameEvent({ eventType, target = null, targetType = null, responseValue = null, correct = null, responseTimeMs = null, errorType = null, emotion = null, context = null }) {
  if (!state.profileId || !currentSessionId || !currentGameKey) return;
  try {
    const { error } = await sb.from('game_events').insert({
      session_id: currentSessionId,
      profile_id: state.profileId,
      game_key: currentGameKey,
      event_type: eventType,
      target: target,
      target_type: targetType,
      response_value: responseValue,
      correct: correct,
      response_time_ms: responseTimeMs,
      error_type: errorType,
      emotion: emotion,
      context: context
    });
    if (error) console.error('[gameEvents] falha ao gravar evento:', error);
  } catch (e) {}
}

const repeatedTapTimestamps = {};
function trackRepeatedTap(elementId) {
  const now = Date.now();
  if (!repeatedTapTimestamps[elementId]) repeatedTapTimestamps[elementId] = [];
  repeatedTapTimestamps[elementId] = repeatedTapTimestamps[elementId].filter(t => now - t < 1000);
  repeatedTapTimestamps[elementId].push(now);
  if (repeatedTapTimestamps[elementId].length >= 3) {
    logGameEvent({ eventType: 'repeated_tap', target: elementId });
    repeatedTapTimestamps[elementId] = [];
  }
}
document.addEventListener('pointerdown', (e) => {
  if (!currentGameKey) return;
  let id = null;
  const btn = e.target.closest('button, .hunt-cell, .trail-pad, .story-card, .light-circle, .emo-btn');
  if (btn) {
    if (btn.id) id = btn.id;
    else if (btn.className && typeof btn.className === 'string') id = btn.className.split(' ')[0];
  }
  if (id) trackRepeatedTap(id);
});

function flushSessionLog(){
  if(currentGameKey) {
    if(!sessionCompleted && sessionDirty[currentGameKey]) {
      logGameEvent({ eventType: 'abandon' });
    }
    if (sessionDirty[currentGameKey]) logSession(currentGameKey);
  }
  currentGameKey = null;
  currentSessionId = null;
}
async function logSession(gameKey){
  sessionDirty[gameKey] = false;
  if(!state.profileId || !state.familyId || !state.profile) return;
  const stars = state.profile.starsByGame[gameKey] || 0;
  const difficulty = getDifficulty(gameKey);
  const startSeeds = sessionSeedsStart[gameKey] ?? state.profile.seeds;
  const seedsEarned = Math.max(0, state.profile.seeds - startSeeds);
  try{
    const { error } = await sb.from('game_sessions').insert({
      id: currentSessionId,
      family_id: state.familyId,
      profile_id: state.profileId,
      game_key: gameKey,
      difficulty,
      stars,
      seeds_earned: seedsEarned
    });
    if(error) throw error;
  }catch(e){ /* best-effort; a failed log shouldn't block gameplay */ }
}

      card.innerHTML = `<span class="sticker-emoji">${st.emoji}</span><span class="sticker-name">${name}</span>`;
    } else {
      card.innerHTML = `<span class="sticker-emoji locked-emoji">${st.emoji}</span><span class="sticker-price">🌰 ${st.price}</span>`;
      card.setAttribute('role', 'button');
      card.tabIndex = 0;
      card.onclick = ()=>attemptUnlock(st.id);
    }
    grid.appendChild(card);
  });
}
function attemptUnlock(id){
  const t = L();
  const st = STICKERS.find(s=>s.id===id);
  if(!st) return;
  if(!state.profile.unlockedStickers) state.profile.unlockedStickers = [];
  if(state.profile.unlockedStickers.includes(id)) return;
  if(state.profile.seeds < st.price){
    showFeedback('albumFeedback', t.album.notEnough(st.price - state.profile.seeds), false);
    return;
  }
  state.profile.seeds -= st.price;
  state.profile.unlockedStickers.push(id);
  document.getElementById('seedCount').textContent = state.profile.seeds;
  saveProfileData();
  renderAlbum();
  const name = st.name[state.lang] || st.name.pt;
  showFeedback('albumFeedback', t.album.unlocked(name, st.emoji), true);
  say(t.mascotGood);
}

/* ========================= PARENTS AREA ========================= */
let parentsForcedSetup = false;
let parentsChildren = [];
let parentsActiveChildId = null;

async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function hashPin(pin){ return sha256Hex('ilhadofoco:' + state.familyId + ':' + pin); }

function openParents(){
  flushSessionLog();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-parents').classList.add('active');
  document.getElementById('parentsTitle').textContent = '🔒 ' + L().parents.areaTitle;
  parentsForcedSetup = false;
  document.getElementById('parentsGate').style.display = 'block';
  document.getElementById('parentsDashboard').style.display = 'none';
  parentsRenderGate();
}
function parentsRenderGate(){
  const t = L();
  const isSetup = !state.familyPinHash || parentsForcedSetup;
  document.getElementById('parentsSetupBlock').style.display = isSetup ? 'block' : 'none';
  document.getElementById('parentsEnterBlock').style.display = isSetup ? 'none' : 'block';
  document.getElementById('parentsCancelForgotBtn').style.display = parentsForcedSetup ? 'inline-block' : 'none';
  document.getElementById('parentsGateTitle').textContent = isSetup ? t.parents.gateSetTitle : t.parents.gateEnterTitle;
  document.getElementById('parentsGateSubtitle').textContent = isSetup ? t.parents.gateSetSubtitle : t.parents.gateEnterSubtitle;
  document.getElementById('parentsPinLabel').textContent = t.parents.pinLabel;
  document.getElementById('parentsPinConfirmLabel').textContent = t.parents.pinConfirmLabel;
  document.getElementById('parentsPinLabelEnter').textContent = t.parents.pinLabel;
  document.getElementById('parentsSavePinBtn').textContent = t.parents.savePinBtn;
  document.getElementById('parentsUnlockBtn').textContent = t.parents.unlockBtn;
  document.getElementById('parentsForgotBtn').textContent = t.parents.forgotPin;
  document.getElementById('parentsCancelForgotBtn').textContent = t.backLabel;
  document.getElementById('parentsPinInput').value = '';
  document.getElementById('parentsPinConfirmInput').value = '';
  document.getElementById('parentsPinInputEnter').value = '';
  document.getElementById('parentsPinError').style.display = 'none';
  document.getElementById('parentsPinErrorEnter').style.display = 'none';
}
function parentsForgotPin(){
  parentsForcedSetup = true;
  parentsRenderGate();
}
function parentsCancelForgot(){
  parentsForcedSetup = false;
  parentsRenderGate();
}
async function parentsSavePin(){
  const t = L();
  const errEl = document.getElementById('parentsPinError');
  const pin = document.getElementById('parentsPinInput').value.trim();
  const confirmPin = document.getElementById('parentsPinConfirmInput').value.trim();
  if(!/^\d{4}$/.test(pin)){ errEl.textContent = t.parents.errPinLength; errEl.style.display = 'block'; return; }
  if(pin !== confirmPin){ errEl.textContent = t.parents.errPinMismatch; errEl.style.display = 'block'; return; }
  try{
    const hash = await hashPin(pin);
    const { error } = await sb.from('families').update({ parent_pin_hash: hash }).eq('id', state.familyId);
    if(error) throw error;
    state.familyPinHash = hash;
    parentsForcedSetup = false;
    await parentsOpenDashboard();
  }catch(e){
    errEl.textContent = t.parents.errGeneric;
    errEl.style.display = 'block';
  }
}
async function parentsCheckPin(){
  const t = L();
  const errEl = document.getElementById('parentsPinErrorEnter');
  const pin = document.getElementById('parentsPinInputEnter').value.trim();
  if(!/^\d{4}$/.test(pin)){ errEl.textContent = t.parents.errPinLength; errEl.style.display = 'block'; return; }
  const hash = await hashPin(pin);
  if(hash === state.familyPinHash){
    await parentsOpenDashboard();
  } else {
    errEl.textContent = t.parents.errPinWrong;
    errEl.style.display = 'block';
    document.getElementById('parentsPinInputEnter').value = '';
  }
}

async function loadSessions(profileId){
  try{
    const { data, error } = await sb.from('game_sessions').select('*').eq('profile_id', profileId).order('played_at', { ascending:true });
    if(error) throw error;
    return data || [];
  }catch(e){ return []; }
}
function getChildDifficulty(child, key){ return (child.difficulty_by_game && child.difficulty_by_game[key]) || 'medio'; }

async function parentsOpenDashboard(){
  document.getElementById('parentsGate').style.display = 'none';
  document.getElementById('parentsDashboard').style.display = 'block';
  parentsChildren = await loadProfilesList();
  const tabsWrap = document.getElementById('parentsChildTabs');
  const body = document.getElementById('parentsDashboardBody');
  if(!parentsChildren.length){
    tabsWrap.innerHTML = '';
    body.innerHTML = '';
    const p = document.createElement('p');
    p.className = 'chart-empty';
    p.textContent = L().parents.noChildren;
    body.appendChild(p);
    return;
  }
  if(!parentsChildren.some(c=>c.id === parentsActiveChildId)) parentsActiveChildId = parentsChildren[0].id;
  renderParentsChildTabs();
  await renderParentsDashboardBody();
}
function renderParentsChildTabs(){
  const wrap = document.getElementById('parentsChildTabs');
  wrap.innerHTML = '';
  if(parentsChildren.length < 2) return;
  parentsChildren.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'diff-btn' + (c.id === parentsActiveChildId ? ' selected' : '');
    btn.textContent = `${c.avatar} ${c.name}`;
    btn.onclick = async ()=>{
      parentsActiveChildId = c.id;
      renderParentsChildTabs();
      await renderParentsDashboardBody();
    };
    wrap.appendChild(btn);
  });
}
async function renderParentsDashboardBody(){
  const t = L();
  const body = document.getElementById('parentsDashboardBody');
  body.innerHTML = '';
  const child = parentsChildren.find(c=>c.id === parentsActiveChildId);
  if(!child) return;
  const sessions = await loadSessions(child.id);
  const locale = state.lang === 'it' ? 'it-IT' : 'pt-BR';

  const summary = document.createElement('div');
  summary.className = 'parents-summary';
  const lastPlayed = sessions.length ? new Date(sessions[sessions.length-1].played_at).toLocaleDateString(locale) : t.parents.never;
  summary.innerHTML = `
    <div class="parents-stat"><span class="v">🌰 ${child.seeds || 0}</span><span class="l">${t.parents.statsSeeds}</span></div>
    <div class="parents-stat"><span class="v">${sessions.length}</span><span class="l">${t.parents.statsSessions}</span></div>
    <div class="parents-stat"><span class="v">${lastPlayed}</span><span class="l">${t.parents.statsLast}</span></div>`;
  body.appendChild(summary);

  const grid = document.createElement('div');
  grid.className = 'parents-grid';
  GAME_KEYS.forEach(key=>{
    const gameSessions = sessions.filter(s=>s.game_key === key);
    const tile = t.tiles[key];
    const card = document.createElement('div');
    card.className = 'parents-card';
    const head = document.createElement('div');
    head.className = 'parents-card-head';
    head.innerHTML = `<span class="emoji">${tile.emoji}</span><span class="title">${tile.title}</span><span class="diff-tag">${t.diff[getChildDifficulty(child, key)]}</span>`;
    card.appendChild(head);
    const chartWrap = document.createElement('div');
    chartWrap.className = 'trend-chart-wrap';
    card.appendChild(chartWrap);
    renderTrendChart(chartWrap, gameSessions);
    if(gameSessions.length){
      const list = document.createElement('ul');
      list.className = 'parents-recent';
      gameSessions.slice(-3).reverse().forEach(s=>{
        const li = document.createElement('li');
        const d = new Date(s.played_at).toLocaleDateString(locale);
        li.textContent = `${d} — ${'⭐'.repeat(s.stars)}${'☆'.repeat(3-s.stars)} — ${t.diff[s.difficulty] || s.difficulty}`;
        list.appendChild(li);
      });
      card.appendChild(list);
    }
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

function renderTrendChart(container, sessions){
  container.innerHTML = '';
  const t = L();
  if(!sessions.length){
    const p = document.createElement('p');
    p.className = 'chart-empty';
    p.textContent = t.parents.noSessions;
    container.appendChild(p);
    return;
  }
  const pts = sessions.slice(-12);
  const W = 280, H = 84, padX = 14, padY = 14;
  const stepX = pts.length > 1 ? (W - padX*2) / (pts.length - 1) : 0;
  const yFor = (stars) => H - padY - (stars/3) * (H - padY*2);
  const locale = state.lang === 'it' ? 'it-IT' : 'pt-BR';

  const tip = document.createElement('div');
  tip.className = 'chart-tip';
  container.appendChild(tip);

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('class', 'trend-chart');
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', t.parents.chartAriaLabel);

  [0,1,2,3].forEach(v=>{
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', padX); line.setAttribute('x2', W - padX);
    line.setAttribute('y1', yFor(v)); line.setAttribute('y2', yFor(v));
    line.setAttribute('class', 'trend-grid');
    svg.appendChild(line);
  });

  const linePoints = pts.map((s,i)=> `${padX + i*stepX},${yFor(s.stars)}`).join(' ');
  const polyline = document.createElementNS(svgNS, 'polyline');
  polyline.setAttribute('points', linePoints);
  polyline.setAttribute('class', 'trend-line');
  svg.appendChild(polyline);

  pts.forEach((s,i)=>{
    const cx = padX + i*stepX, cy = yFor(s.stars);
    const c = document.createElementNS(svgNS, 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', 4);
    c.setAttribute('class', 'trend-dot');
    c.setAttribute('tabindex', '0');
    const dateStr = new Date(s.played_at).toLocaleDateString(locale, { day:'2-digit', month:'2-digit' });
    const label = `${dateStr} · ${'⭐'.repeat(s.stars)}${'☆'.repeat(3-s.stars)} · ${t.diff[s.difficulty] || s.difficulty}`;
    const show = ()=>{
      tip.textContent = label;
      tip.style.left = (cx/W*100) + '%';
      tip.style.top = (cy/H*100) + '%';
      tip.style.display = 'block';
    };
    const hide = ()=>{ tip.style.display = 'none'; };
    c.addEventListener('mouseenter', show);
    c.addEventListener('mouseleave', hide);
    c.addEventListener('focus', show);
    c.addEventListener('blur', hide);
    svg.appendChild(c);
  });

  container.appendChild(svg);
}
